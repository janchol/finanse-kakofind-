function EC({value,onSave,type=“text”,options,w=90,color}){

useEffect(()=>{setV(value);},[value]);
const save=()=>{setEd(false);if(String(v)!==String(value))onSave(type===“number”?+v:v);};

return <input ref={ref} value={v} type={type===“number”?“number”:“text”} onChange={e=>setV(e.target.value)} onBlur={save} onKeyDown={e=>{if(e.key===“Enter”)save();if(e.key===“Escape”)cancel();}} style={{background:C.bg3,border:`1px solid ${C.red}`,borderRadius:5,color:C.text,fontSize:13,padding:“3px 7px”,fontFamily:“inherit”,outline:“none”,width:w}}/>;

            {clients.map(c=>({...c,total:payments.filter(p=>p.clientId===c.id&&p.status==="oplacony").reduce((s,p)=>s+p.amount,0)})).sort((a,b)=>b.total-a.total).map((c,i)=>(
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.bg3}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,color:i===0?C.red:C.dim,fontWeight:700,width:20,textAlign:"center"}}>{i===0?"🥇":`#${i+1}`}</span><span style={{fontSize:13}}>{c.name}</span></div>
                <span style={{fontWeight:800,color:C.red,fontFamily:"'Bebas Neue',sans-serif"}}>{fmt(c.total)}</span>
              </div>
            ))}
          </div>
          <div style={{background:C.bg1,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}>
            <h3 style={{margin:"0 0 11px",fontSize:11,color:C.dim,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>Koszty wg kategorii</h3>
            {["tech","marketing","uslugi","inne"].map(cat=>{
              const t=costs.filter(c=>c.category===cat).reduce((s,c)=>s+c.amount,0);
              const p=totC?Math.round((t/totC)*100):0;
              const col={tech:C.blue,marketing:C.red,uslugi:C.green,inne:C.dim}[cat];
              return <div key={cat} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:13,textTransform:"capitalize"}}>{cat}</span><span style={{fontSize:13,fontWeight:700,color:col}}>{fmt(t)} <span style={{color:C.dim,fontWeight:400}}>({p}%)</span></span></div>
                <div style={{height:4,background:C.bg3,borderRadius:2}}><div style={{height:"100%",background:col,borderRadius:2,width:`${p}%`}}/></div>
              </div>;
            })}
            <div style={{marginTop:12,padding:11,background:C.bg0,borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:C.dim,textTransform:"uppercase",letterSpacing:1}}>Marża netto</span>
              <span style={{fontSize:22,fontWeight:800,color:C.green,fontFamily:"'Bebas Neue',sans-serif"}}>{totR?Math.round((net/totR)*100):0}%</span>
            </div>
          </div>
        </div>
      </div>
    )}
  </main>

  {modal==="payment"&&(

      <Row><Field label="Kwota *" half><input style={iSt} type="number" placeholder="0" value={form.amount||""} onChange={fv("amount")}/></Field><Field label="Data *" half><input style={iSt} type="date" value={form.date||""} onChange={fv("date")}/></Field></Row>
      <Row><Field label="Forma" half><select style={iSt} value={form.type||"gotowka"} onChange={fv("type")}><option value="gotowka">💳 Przelew</option><option value="produkt">📦 Produkt</option></select></Field><Field label="Status" half><select style={iSt} value={form.status||"oczekujacy"} onChange={fv("status")}><option value="oczekujacy">Oczekuje</option><option value="nadchodzacy">Nadchodzi</option><option value="oplacony">Opłacony</option></select></Field></Row>
      <Field label="Notatka"><input style={iSt} placeholder="np. Maj…" value={form.note||""} onChange={fv("note")}/></Field>

  {modal==="cost"&&(
    <Modal title={form.id?"EDYTUJ KOSZT":"NOWY KOSZT"} onClose={cM}>
      <Field label="Nazwa *"><input style={iSt} placeholder="np. Hosting…" value={form.name||""} onChange={fv("name")}/></Field>
      <Row><Field label="Kwota *" half><input style={iSt} type="number" placeholder="0" value={form.amount||""} onChange={fv("amount")}/></Field><Field label="Kategoria" half><select style={iSt} value={form.category||"inne"} onChange={fv("category")}><option value="tech">Tech</option><option value="marketing">Marketing</option><option value="uslugi">Usługi</option><option value="inne">Inne</option></select></Field></Row>
      <Row><Field label="Data" half><input style={iSt} type="date" value={form.date||""} onChange={fv("date")}/></Field><Field label="Typ" half><select style={iSt} value={form.recurring||"nie"} onChange={fv("recurring")}><option value="nie">Jednorazowy</option><option value="tak">🔄 Cykliczny</option></select></Field></Row>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}><button onClick={cM} style={btnG}>Anuluj</button><button style={btnP} onClick={saveCost}>Zapisz</button></div>
    </Modal>
  )}
  {modal==="client"&&(
    <Modal title={form.id?"EDYTUJ KLIENTA":"NOWY KLIENT"} onClose={cM}>
      <Field label="Nazwa *"><input style={iSt} placeholder="np. TechGear Pro…" value={form.name||""} onChange={fv("name")}/></Field>
      <Row><Field label="Typ" half><select style={iSt} value={form.type||"miesieczny"} onChange={fv("type")}><option value="miesieczny">💰 Miesięczna</option><option value="prowizja">% Prowizja</option><option value="mix">🔀 Mix</option></select></Field><Field label="Stawka" half><input style={iSt} type="number" value={form.rate||""} onChange={fv("rate")}/></Field></Row>
      <Field label="Notatki"><input style={iSt} placeholder="Warunki, kontakt…" value={form.notes||""} onChange={fv("notes")}/></Field>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}}><button onClick={cM} style={btnG}>Anuluj</button><button style={btnP} onClick={saveCl}>Zapisz</button></div>
    </Modal>
  )}
