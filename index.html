<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AffiliateDes Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#E60000;border-radius:2px;}
input,select,button{font-family:inherit;}
input:focus,select:focus{outline:1px solid #E60000;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shake .4s ease;}
.fi{animation:fi .35s ease;}
.nav-tabs{display:flex;flex:1;overflow-x:auto;}
.mob-menu{display:none;position:fixed;top:48px;left:0;right:0;background:#181818;border-bottom:1px solid #222;z-index:199;padding:8px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{padding:10px 12px;text-align:left;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;white-space:nowrap;background:#0a0a0a;}
td{padding:10px 12px;border-top:1px solid #1e1e1e;font-size:13px;}
tr:hover td{background:#141414;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
.btn-red{background:#E60000;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ghost{background:none;border:1px solid #2a2a2a;color:#aaa;border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12px;}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:18px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.modal-box{background:#181818;border:1px solid #2a2a2a;border-top:3px solid #E60000;border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.field-label{display:block;font-size:10px;color:#555;margin-bottom:5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;}
.field-input{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;color:#fff;font-size:13px;}
.field-select{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;color:#fff;font-size:13px;}
.field-select option{background:#1e1e1e;}
.editable{cursor:text;border-bottom:1px dashed #2a2a2a;padding-bottom:1px;display:inline-block;}
.editable:hover{border-bottom-color:#E60000;}
.edit-input{background:#1e1e1e;border:1px solid #E60000;border-radius:5px;color:#fff;font-size:13px;padding:3px 7px;font-family:inherit;}
.edit-select{background:#1e1e1e;border:1px solid #E60000;border-radius:5px;color:#fff;font-size:13px;padding:2px 6px;font-family:inherit;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;max-width:300px;}
.filter-btn{border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid;}
@media(max-width:640px){
  .nav-tabs{display:none;}
  .mob-btn{display:flex!important;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .two-col{grid-template-columns:1fr;}
  .three-col{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── dane startowe ──────────────────────────────────────────────────────────
const PASSWORD = "Kako#9Rx!mZ4@vQ";
const IC=[{id:1,name:"TechGear Pro",type:"prowizja",rate:12,status:"aktywny",notes:"12% od sprzedaży"},{id:2,name:"FashionHub",type:"prowizja",rate:8,status:"aktywny",notes:"8% od sprzedaży"},{id:3,name:"NutriBrand",type:"prowizja",rate:15,status:"aktywny",notes:"15% od sprzedaży"},{id:4,name:"StyleCo",type:"miesieczny",rate:2400,status:"aktywny",notes:"Stała miesięczna"},{id:5,name:"GadgetWorld",type:"miesieczny",rate:1800,status:"aktywny",notes:"Częściowo w produktach"},{id:6,name:"BeautyLine",type:"miesieczny",rate:1200,status:"oczekujacy",notes:"Negocjacje"}];
const IP=[{id:1,clientId:1,amount:8400,date:"2026-04-15",status:"oplacony",type:"gotowka",note:"Kwiecień"},{id:2,clientId:2,amount:3200,date:"2026-04-22",status:"oplacony",type:"gotowka",note:"Kwiecień"},{id:3,clientId:4,amount:2400,date:"2026-05-01",status:"oplacony",type:"gotowka",note:"Maj"},{id:4,clientId:5,amount:900,date:"2026-05-01",status:"oplacony",type:"produkt",note:"Słuchawki"},{id:5,clientId:5,amount:900,date:"2026-05-01",status:"oplacony",type:"gotowka",note:"Reszta maja"},{id:6,clientId:3,amount:6750,date:"2026-05-10",status:"oczekujacy",type:"gotowka",note:"Maj"},{id:7,clientId:1,amount:9100,date:"2026-05-15",status:"oczekujacy",type:"gotowka",note:"Maj"},{id:8,clientId:2,amount:2900,date:"2026-05-22",status:"oczekujacy",type:"gotowka",note:"Maj"},{id:9,clientId:4,amount:2400,date:"2026-06-01",status:"nadchodzacy",type:"gotowka",note:"Czerwiec"},{id:10,clientId:6,amount:1200,date:"2026-06-01",status:"nadchodzacy",type:"gotowka",note:"Start"}];
const ICO=[{id:1,name:"Hosting & domeny",amount:180,category:"tech",date:"2026-05-01",recurring:true},{id:2,name:"Narzędzia marketingowe",amount:320,category:"tech",date:"2026-05-01",recurring:true},{id:3,name:"Obsługa księgowa",amount:450,category:"uslugi",date:"2026-05-05",recurring:true},{id:4,name:"Reklama własna",amount:600,category:"marketing",date:"2026-05-08",recurring:false},{id:5,name:"Sprzęt biurowy",amount:240,category:"inne",date:"2026-04-20",recurring:false}];
const HIST=[{month:"Sty",revenue:19800,costs:1200},{month:"Lut",revenue:22600,costs:1350},{month:"Mar",revenue:17400,costs:1550},{month:"Kwi",revenue:25200,costs:1490}];

// ── helpers ────────────────────────────────────────────────────────────────
const fmt=n=>new Intl.NumberFormat("pl-PL",{style:"currency",currency:"PLN",maximumFractionDigits:0}).format(n||0);
const fmtDate=d=>new Date(d).toLocaleDateString("pl-PL",{day:"2-digit",month:"short",year:"numeric"});
const TODAY=new Date("2026-05-13");
const dU=d=>Math.ceil((new Date(d)-TODAY)/86400000);
const uid=()=>Date.now()+Math.random();
const h=(tag,props,...children)=>{
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
};

// ── state ──────────────────────────────────────────────────────────────────
let state={
  loggedIn:false,
  tab:"dashboard",
  clients:JSON.parse(JSON.stringify(IC)),
  payments:JSON.parse(JSON.stringify(IP)),
  costs:JSON.parse(JSON.stringify(ICO)),
  modal:null,
  form:{},
  pf:"wszystkie",
  mob:false,
  toasts:[],
};

function setState(patch){
  Object.assign(state,typeof patch==="function"?patch(state):patch);
  render();
}

// ── toast ──────────────────────────────────────────────────────────────────
function toast(msg,type="ok"){
  const id=uid();
  setState(s=>({toasts:[...s.toasts,{id,msg,type}]}));
  setTimeout(()=>setState(s=>({toasts:s.toasts.filter(t=>t.id!==id)})),2800);
}

// ── badge ──────────────────────────────────────────────────────────────────
function badge(s){
  const m={oplacony:{l:"Opłacony",bg:"#001a0a",c:"#00C851"},oczekujacy:{l:"Oczekuje",bg:"#1a1000",c:"#FFB300"},nadchodzacy:{l:"Nadchodzi",bg:"#001020",c:"#4DA6FF"},aktywny:{l:"Aktywny",bg:"#001a0a",c:"#00C851"},zalegly:{l:"Zaległy",bg:"#1a0000",c:"#FF4444"}};
  const x=m[s]||m.oczekujacy;
  const el=h("span",{className:"badge",style:{background:x.bg,color:x.c,border:`1px solid ${x.c}33`}},
    h("span",{className:"badge-dot",style:{background:x.c}}),x.l);
  return el;
}

// ── editable cell ──────────────────────────────────────────────────────────
function editableCell(value,onSave,opts={}){
  const {type="text",options,color,w=90}=opts;
  const wrap=h("span",{});

  function showDisplay(){
    wrap.innerHTML="";
    const sp=h("span",{className:"editable",style:{color:color||"",minWidth:w+"px"}},String(value));
    sp.title="Kliknij aby edytować";
    sp.onclick=()=>showEdit();
    wrap.appendChild(sp);
  }

  function showEdit(){
    wrap.innerHTML="";
    if(options){
      const sel=h("select",{className:"edit-select"});
      options.forEach(o=>{
        const opt=document.createElement("option");
        opt.value=o.v;opt.textContent=o.l;
        if(o.v===value)opt.selected=true;
        sel.appendChild(opt);
      });
      sel.onchange=()=>{value=sel.value;onSave(sel.value);showDisplay();};
      sel.onblur=()=>showDisplay();
      wrap.appendChild(sel);
      setTimeout(()=>sel.focus(),0);
    } else {
      const inp=h("input",{className:"edit-input",type:type==="number"?"number":"text",value:String(value),style:{width:w+"px"}});
      const save=()=>{const v=type==="number"?+inp.value:inp.value;if(String(v)!==String(value)){value=v;onSave(v);}showDisplay();};
      inp.onblur=save;
      inp.onkeydown=e=>{if(e.key==="Enter")save();if(e.key==="Escape"){showDisplay();}};
      wrap.appendChild(inp);
      setTimeout(()=>inp.focus(),0);
    }
  }

  showDisplay();
  return wrap;
}

// ── calcs ──────────────────────────────────────────────────────────────────
function calcs(){
  const{payments,costs}=state;
  const paid=payments.filter(p=>p.status==="oplacony");
  const pend=payments.filter(p=>p.status==="oczekujacy");
  const totR=paid.reduce((s,p)=>s+p.amount,0);
  const totP=pend.reduce((s,p)=>s+p.amount,0);
  const totC=costs.reduce((s,c)=>s+c.amount,0);
  const net=totR-totC;
  return{paid,pend,totR,totP,totC,net,sp:{a:net*.5,b:net*.25,c:net*.25}};
}

function clientMap(){return Object.fromEntries(state.clients.map(c=>[c.id,c]));}

// ── KPI card ───────────────────────────────────────────────────────────────
function kpi(label,value,sub,accent,icon){
  return h("div",{style:{background:"#111",border:"1px solid #222",borderRadius:12,padding:"16px 18px",borderTop:`3px solid ${accent}`,position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"absolute",top:10,right:12,fontSize:18,opacity:.08}},icon),
    h("div",{style:{fontSize:10,color:"#555",marginBottom:6,textTransform:"uppercase",letterSpacing:"1.2px",fontWeight:600}},label),
    h("div",{style:{fontSize:20,fontWeight:800,color:accent,marginBottom:2,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}},value),
    h("div",{style:{fontSize:11,color:"#555"}},sub)
  );
}

// ── modal helpers ──────────────────────────────────────────────────────────
function field(label,inputEl,half){
  return h("div",{style:{marginBottom:12,...(half?{flex:1}:{})}},
    h("label",{className:"field-label"},label),
    inputEl
  );
}
function row(...children){return h("div",{style:{display:"flex",gap:10}},children);}
function fInput(key,placeholder,type="text"){
  const el=h("input",{className:"field-input",type,placeholder:placeholder||"",value:state.form[key]||""});
  el.oninput=e=>state.form[key]=e.target.value;
  return el;
}
function fSelect(key,options,defaultVal){
  const sel=h("select",{className:"field-select"});
  options.forEach(o=>{
    const opt=document.createElement("option");
    opt.value=o.v;opt.textContent=o.l;
    if((state.form[key]||defaultVal)===o.v)opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=e=>state.form[key]=e.target.value;
  return sel;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────
function renderLogin(){
  let pw="",show=false,err=false,shaking=false;

  const wrap=h("div",{style:{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",padding:16}});
  const inner=h("div",{className:"fi",style:{width:"100%",maxWidth:360}});
  wrap.appendChild(inner);

  function build(){
    inner.innerHTML="";
    inner.appendChild(
      h("div",{style:{textAlign:"center",marginBottom:32}},
        h("div",{style:{width:50,height:50,background:"#E60000",borderRadius:12,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',sans-serif",marginBottom:12}},"A"),
        h("div",{},
          h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3}},"AFFILIATE"),
          h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3,color:"#E60000"}},"DESK")
        ),
        h("div",{style:{fontSize:11,color:"#555",marginTop:3,letterSpacing:1}},"PANEL FINANSOWY · PRO")
      )
    );

    const card=h("div",{className:shaking?"shake":"",style:{background:"#111",border:"1px solid #222",borderTop:"3px solid #E60000",borderRadius:14,padding:26}});
    card.appendChild(h("div",{style:{fontSize:11,color:"#555",marginBottom:18,letterSpacing:1,textTransform:"uppercase",fontWeight:600}},"🔒 Wymagane hasło dostępu"));

    const pwWrap=h("div",{style:{position:"relative",marginBottom:8}});
    const pwInp=h("input",{type:show?"text":"password",placeholder:"Wpisz hasło…",style:{width:"100%",background:"#1e1e1e",border:`1px solid ${err?"#E60000":"#2a2a2a"}`,borderRadius:8,padding:"9px 44px 9px 11px",color:"#fff",fontSize:15}});
    pwInp.value=pw;
    pwInp.oninput=e=>{pw=e.target.value;err=false;};
    pwInp.onkeydown=e=>{if(e.key==="Enter")tryLogin();};
    pwInp.focus();
    const eye=h("button",{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:15,padding:4}},show?"🙈":"👁");
    eye.onclick=()=>{show=!show;build();};
    pwWrap.appendChild(pwInp);pwWrap.appendChild(eye);
    card.appendChild(h("label",{className:"field-label"},"Hasło"));
    card.appendChild(pwWrap);
    if(err)card.appendChild(h("div",{style:{color:"#FF4444",fontSize:12,marginBottom:8,fontWeight:600}},"⚠ Nieprawidłowe hasło"));

    const loginBtn=h("button",{className:"btn-red",style:{width:"100%",padding:13,fontSize:14,letterSpacing:1}},"ZALOGUJ SIĘ →");
    loginBtn.onclick=tryLogin;
    card.appendChild(loginBtn);
    inner.appendChild(card);
  }

  function tryLogin(){
    if(pw===PASSWORD){setState({loggedIn:true});}
    else{err=true;shaking=true;pw="";build();setTimeout(()=>{shaking=false;build();},500);}
  }

  build();
  return wrap;
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard(){
  const{totR,totP,totC,net,sp,paid,pend}=calcs();
  const cm=clientMap();

  const el=h("div",{});
  el.appendChild(h("h1",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,margin:"0 0 3px",letterSpacing:2}},"PRZEGLĄD — MAJ 2026"));
  el.appendChild(h("p",{style:{color:"#555",margin:"0 0 14px",fontSize:12}},`${state.clients.filter(c=>c.status==="aktywny").length} aktywnych klientów`));

  const grid=h("div",{className:"kpi-grid"});
  grid.appendChild(kpi("Przychody (opłacone)",fmt(totR),`${paid.length} faktur`,"#00C851","💰"));
  grid.appendChild(kpi("Oczekuje na wpłatę",fmt(totP),`${pend.length} faktur`,"#FFB300","⏳"));
  grid.appendChild(kpi("Koszty operacyjne",fmt(totC),`${state.costs.length} pozycji`,"#E60000","📉"));
  grid.appendChild(kpi("Zysk netto",fmt(net),"50/25/25","#4DA6FF","📈"));
  el.appendChild(grid);

  const two=h("div",{className:"two-col"});

  // upcoming
  const upCard=h("div",{className:"card"});
  upCard.appendChild(h("h3",{style:{margin:"0 0 11px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Najbliższe płatności"));
  const upcoming=[...state.payments].filter(p=>p.status!=="oplacony").sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
  upcoming.forEach(p=>{
    const d=dU(p.date);
    const row2=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1e1e1e"}});
    const left=h("div",{});
    left.appendChild(h("div",{style:{fontSize:13,fontWeight:600}},cm[p.clientId]?.name||"—"));
    const sub=h("div",{style:{fontSize:11,color:"#555",marginTop:1}},fmtDate(p.date)+" · ");
    const ds=d<0?h("span",{style:{color:"#FF4444"}},`zaległe ${Math.abs(d)}d`):d===0?h("span",{style:{color:"#E60000",fontWeight:800}},"DZIŚ!"):h("span",{style:{color:d<=3?"#FFB300":"#555"}},`za ${d}d`);
    sub.appendChild(ds);left.appendChild(sub);
    const right=h("div",{style:{textAlign:"right"}});
    right.appendChild(h("div",{style:{fontWeight:800,fontSize:14,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}},fmt(p.amount)));
    right.appendChild(badge(d<0?"zalegly":p.status));
    row2.appendChild(left);row2.appendChild(right);
    upCard.appendChild(row2);
  });
  if(!upcoming.length)upCard.appendChild(h("div",{style:{color:"#555",fontSize:13}},"Brak oczekujących 🎉"));
  two.appendChild(upCard);

  // split
  const splitCard=h("div",{className:"card"});
  splitCard.appendChild(h("h3",{style:{margin:"0 0 11px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Podział zysku netto"));
  const eq=h("div",{style:{marginBottom:10,padding:"8px 12px",background:"#0a0a0a",borderRadius:8,fontSize:12,color:"#555",display:"flex",justifyContent:"space-between"}});
  eq.appendChild(h("span",{},`${fmt(totR)} − ${fmt(totC)}`));
  eq.appendChild(h("span",{style:{color:"#4DA6FF",fontWeight:800,fontFamily:"'Bebas Neue',sans-serif"}},fmt(net)));
  splitCard.appendChild(eq);
  [{n:"Wspólnik A",p:"50%",a:sp.a,c:"#E60000",w:"50%"},{n:"Wspólnik B",p:"25%",a:sp.b,c:"#00C851",w:"25%"},{n:"Wspólnik C",p:"25%",a:sp.c,c:"#4DA6FF",w:"25%"}].forEach(s=>{
    const sr=h("div",{style:{marginBottom:10}});
    const sr2=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}});
    sr2.appendChild(h("span",{style:{fontSize:13}},s.n+" ",h("span",{style:{color:"#555"}},s.p)));
    sr2.appendChild(h("span",{style:{fontWeight:800,color:s.c,fontFamily:"'Bebas Neue',sans-serif"}},fmt(s.a)));
    sr.appendChild(sr2);
    const bar=h("div",{style:{height:4,background:"#1e1e1e",borderRadius:2}});
    bar.appendChild(h("div",{style:{height:"100%",background:s.c,borderRadius:2,width:s.w}}));
    sr.appendChild(bar);splitCard.appendChild(sr);
  });
  two.appendChild(splitCard);
  el.appendChild(two);
  return el;
}

// ── PAYMENTS ───────────────────────────────────────────────────────────────
function renderPayments(){
  const cm=clientMap();
  const el=h("div",{});
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:10}});
  hdr.appendChild(h("div",{},h("h2",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,margin:0,letterSpacing:2}},"PŁATNOŚCI"),h("p",{style:{color:"#555",margin:"2px 0 0",fontSize:12}},`${state.payments.length} łącznie`)));
  const addBtn=h("button",{className:"btn-red"},"+ Dodaj płatność");
  addBtn.onclick=()=>setState({modal:"payment",form:{}});
  hdr.appendChild(addBtn);
  el.appendChild(hdr);

  // filters
  const filters=h("div",{style:{display:"flex",gap:6,marginBottom:11,flexWrap:"wrap"}});
  [["wszystkie","Wszystkie"],["oczekujacy","Oczekuje"],["oplacony","Opłacone"],["nadchodzacy","Nadchodzi"],["zaległe","Zaległe"]].forEach(([v,l])=>{
    const active=state.pf===v;
    const btn=h("button",{className:"filter-btn",style:{background:active?"#E60000":"#111",borderColor:active?"#E60000":"#222",color:active?"#fff":"#555",fontWeight:active?700:400}},l);
    btn.onclick=()=>setState({pf:v});
    filters.appendChild(btn);
  });

// ── ANALYTICS ─────────────────────────────────────────────────────────────
function renderAnalytics(){
  const{totR,totC,net}=calcs();
  const chartData=[...HIST.map(m=>({...m,net:m.revenue-m.costs})),{month:"Maj",revenue:totR,costs:totC,net}];
  const el=h("div",{});
  el.appendChild(h("h2",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,margin:"0 0 14px",letterSpacing:2}},"ANALIZY"));

  // simple bar chart via canvas
  const canvasWrap=h("div",{className:"card",style:{marginBottom:13}});
  canvasWrap.appendChild(h("h3",{style:{margin:"0 0 14px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Przychody vs zysk netto (miesięcznie)"));
  const canvas=document.createElement("canvas");
  canvas.width=700;canvas.height=180;canvas.style.width="100%";canvas.style.height="auto";
  canvasWrap.appendChild(canvas);
  el.appendChild(canvasWrap);
  setTimeout(()=>{
    const ctx=canvas.getContext("2d");
    const W=700,H=180,PAD=40,BAR_W=40,GAP=60;
    const maxV=Math.max(...chartData.map(d=>d.revenue))*1.1;
    ctx.clearRect(0,0,W,H);
    chartData.forEach((d,i)=>{
      const x=PAD+i*(BAR_W*2+GAP);
      const rH=(d.revenue/maxV)*(H-40);
      const nH=(Math.max(0,d.net)/maxV)*(H-40);
      ctx.fillStyle="#00C85144";ctx.fillRect(x,H-20-rH,BAR_W,rH);
      ctx.fillStyle="#00C851";ctx.fillRect(x,H-20-rH,BAR_W,3);
      ctx.fillStyle="#E6000044";ctx.fillRect(x+BAR_W+4,H-20-nH,BAR_W,nH);
      ctx.fillStyle="#E60000";ctx.fillRect(x+BAR_W+4,H-20-nH,BAR_W,3);
      ctx.fillStyle="#555";ctx.font="11px DM Sans,sans-serif";ctx.textAlign="center";
      ctx.fillText(d.month,x+BAR_W,H-4);
    });
    ctx.fillStyle="#00C851";ctx.fillRect(W-130,10,12,12);ctx.fillStyle="#555";ctx.font="11px sans-serif";ctx.textAlign="left";ctx.fillText("Przychody",W-115,21);
    ctx.fillStyle="#E60000";ctx.fillRect(W-130,28,12,12);ctx.fillStyle="#555";ctx.fillText("Zysk netto",W-115,39);
  },50);

  const two=h("div",{className:"two-col"});

  // top clients
  const topCard=h("div",{className:"card"});
  topCard.appendChild(h("h3",{style:{margin:"0 0 11px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Top klienci"));
  state.clients.map(c=>({...c,total:state.payments.filter(p=>p.clientId===c.id&&p.status==="oplacony").reduce((s,p)=>s+p.amount,0)})).sort((a,b)=>b.total-a.total).forEach((c,i)=>{
    const row2=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1e1e1e"}});
    row2.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:8}},h("span",{style:{fontSize:12,color:i===0?"#E60000":"#555",fontWeight:700,width:20,textAlign:"center"}},i===0?"🥇":`#${i+1}`),h("span",{style:{fontSize:13}},c.name)));
    row2.appendChild(h("span",{style:{fontWeight:800,color:"#E60000",fontFamily:"'Bebas Neue',sans-serif"}},fmt(c.total)));
    topCard.appendChild(row2);
  });
  two.appendChild(topCard);

  // cats
  const catCard=h("div",{className:"card"});
  catCard.appendChild(h("h3",{style:{margin:"0 0 11px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Koszty wg kategorii"));
  const{totC:tc}=calcs();
  ["tech","marketing","uslugi","inne"].forEach(cat=>{
    const t=state.costs.filter(c=>c.category===cat).reduce((s,c)=>s+c.amount,0);
    const p=tc?Math.round((t/tc)*100):0;
    const col={tech:"#4DA6FF",marketing:"#E60000",uslugi:"#00C851",inne:"#555"}[cat];
    const div=h("div",{style:{marginBottom:10}});
    const r=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}});
    r.appendChild(h("span",{style:{fontSize:13,textTransform:"capitalize"}},cat));
    r.appendChild(h("span",{style:{fontSize:13,fontWeight:700,color:col}},fmt(t)," ",h("span",{style:{color:"#555",fontWeight:400}},`(${p}%)`)));
    div.appendChild(r);
    const bar=h("div",{style:{height:4,background:"#1e1e1e",borderRadius:2}});
    bar.appendChild(h("div",{style:{height:"100%",background:col,borderRadius:2,width:`${p}%`}}));
    div.appendChild(bar);catCard.appendChild(div);
  });
  catCard.appendChild(h("div",{style:{marginTop:12,padding:11,background:"#0a0a0a",borderRadius:8,display:"flex",justifyContent:"space-between",alignItems:"center"}},
    h("span",{style:{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:1}},"Marża netto"),
    h("span",{style:{fontSize:22,fontWeight:800,color:"#00C851",fontFamily:"'Bebas Neue',sans-serif"}},`${totR?Math.round((net/totR)*100):0}%`)
  ));
  two.appendChild(catCard);
  el.appendChild(two);
  return el;
}

    box.appendChild(field("Notatka",noteI));

    const btns=h("div",{style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}});
    const cancel=h("button",{className:"btn-ghost"},"Anuluj");cancel.onclick=()=>setState({modal:null,form:{}});
    const save=h("button",{className:"btn-red"},"Zapisz");
    save.onclick=()=>{
      if(!form.clientId||!form.amount||!form.date){toast("Wypełnij wymagane pola","error");return;}
      const r={id:form.id||uid(),clientId:+form.clientId,amount:+form.amount,date:form.date,status:form.status||"oczekujacy",type:form.type||"gotowka",note:form.note||""};
      state.payments=form.id?state.payments.map(p=>p.id===form.id?r:p):[...state.payments,r];
      toast(form.id?"Zaktualizowano":"Dodano");setState({modal:null,form:{}});
    };
    btns.appendChild(cancel);btns.appendChild(save);box.appendChild(btns);
  }

  if(modal==="cost"){
    const nameI=h("input",{className:"field-input",placeholder:"np. Hosting…",value:form.name||""});nameI.oninput=e=>form.name=e.target.value;box.appendChild(field("Nazwa *",nameI));
    const amtI=h("input",{className:"field-input",type:"number",placeholder:"0",value:form.amount||""});amtI.oninput=e=>form.amount=e.target.value;
    const catSel=h("select",{className:"field-select"});
    ["tech","marketing","uslugi","inne"].forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;if((form.category||"inne")===v)o.selected=true;catSel.appendChild(o);});
    catSel.onchange=e=>form.category=e.target.value;
    box.appendChild(row(field("Kwota *",amtI,true),field("Kategoria",catSel,true)));
    const dateI=h("input",{className:"field-input",type:"date",value:form.date||""});dateI.oninput=e=>form.date=e.target.value;
    const recSel=h("select",{className:"field-select"});
    [{v:"nie",l:"Jednorazowy"},{v:"tak",l:"🔄 Cykliczny"}].forEach(o=>{const op=document.createElement("option");op.value=o.v;op.textContent=o.l;if((form.recurring||"nie")===o.v)op.selected=true;recSel.appendChild(op);});
    recSel.onchange=e=>form.recurring=e.target.value;
    box.appendChild(row(field("Data",dateI,true),field("Typ",recSel,true)));
    const btns=h("div",{style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}});
    const cancel=h("button",{className:"btn-ghost"},"Anuluj");cancel.onclick=()=>setState({modal:null,form:{}});
    const save=h("button",{className:"btn-red"},"Zapisz");
    save.onclick=()=>{
      if(!form.name||!form.amount){toast("Wypełnij wymagane pola","error");return;}
      const r={id:form.id||uid(),name:form.name,amount:+form.amount,category:form.category||"inne",date:form.date||TODAY.toISOString().slice(0,10),recurring:form.recurring==="tak"};
      state.costs=form.id?state.costs.map(c=>c.id===form.id?r:c):[...state.costs,r];
      toast(form.id?"Zaktualizowano":"Dodano");setState({modal:null,form:{}});
    };
    btns.appendChild(cancel);btns.appendChild(save);box.appendChild(btns);
  }

  if(modal==="client"){
    const nameI=h("input",{className:"field-input",placeholder:"np. TechGear Pro…",value:form.name||""});nameI.oninput=e=>form.name=e.target.value;box.appendChild(field("Nazwa *",nameI));
    const typeSel=h("select",{className:"field-select"});
    [{v:"miesieczny",l:"💰 Miesięczna"},{v:"prowizja",l:"% Prowizja"},{v:"mix",l:"🔀 Mix"}].forEach(o=>{const op=document.createElement("option");op.value=o.v;op.textContent=o.l;if((form.type||"miesieczny")===o.v)op.selected=true;typeSel.appendChild(op);});
    typeSel.onchange=e=>form.type=e.target.value;
    const rateI=h("input",{className:"field-input",type:"number",placeholder:"0",value:form.rate||""});rateI.oninput=e=>form.rate=e.target.value;
    box.appendChild(row(field("Typ",typeSel,true),field("Stawka",rateI,true)));
    const notesI=h("input",{className:"field-input",placeholder:"Warunki, kontakt…",value:form.notes||""});notesI.oninput=e=>form.notes=e.target.value;box.appendChild(field("Notatki",notesI));
    const btns=h("div",{style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}});
    const cancel=h("button",{className:"btn-ghost"},"Anuluj");cancel.onclick=()=>setState({modal:null,form:{}});
    const save=h("button",{className:"btn-red"},"Zapisz");
    save.onclick=()=>{
      if(!form.name){toast("Podaj nazwę","error");return;}
      const r={id:form.id||uid(),name:form.name,type:form.type||"miesieczny",rate:+form.rate||0,status:"aktywny",notes:form.notes||""};
      state.clients=form.id?state.clients.map(c=>c.id===form.id?r:c):[...state.clients,r];
      toast(form.id?"Zaktualizowano":"Dodano");setState({modal:null,form:{}});
    };
    btns.appendChild(cancel);btns.appendChild(save);box.appendChild(btns);
  }

  bg.appendChild(box);
  return bg;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  if(!state.loggedIn){app.appendChild(renderLogin());return;}

  // nav
  const nav=h("nav",{style:{background:"#0d0d0d",borderBottom:"1px solid #222",padding:"0 18px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:200}});
  nav.appendChild(h("div",{style:{marginRight:14,padding:"10px 0",flexShrink:0,display:"flex",alignItems:"center",gap:7}},
    h("div",{style:{width:24,height:24,background:"#E60000",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff",fontFamily:"'Bebas Neue',sans-serif"}},"A"),
    h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,letterSpacing:2}},
      "AFFILIATE",h("span",{style:{color:"#E60000"}},"DESK")
    ),
    h("span",{style:{background:"#E60000",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:3}},"PRO")
  ));

  const TABS=[{id:"dashboard",icon:"◈",label:"Přehled"},{id:"payments",icon:"◎",label:"Płatności"},{id:"clients",icon:"◉",label:"Klienci"},{id:"costs",icon:"◌",label:"Koszty"},{id:"split",icon:"◑",label:"Podział"},{id:"analytics",icon:"◐",label:"Analizy"}];
  // fix labels
  TABS[0].label="Przegląd";

  const tabsDiv=h("div",{className:"nav-tabs"});
  const odC=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0).length;
  TABS.forEach(t=>{
    const active=state.tab===t.id;
    const btn=h("button",{style:{background:active?"#150000":"none",border:"none",color:active?"#E60000":"#555",padding:"14px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",borderBottom:active?"2px solid #E60000":"2px solid transparent",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}},t.icon," ",t.label);
    if(t.id==="payments"&&odC>0)btn.appendChild(h("span",{style:{background:"#E60000",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:10,fontWeight:800}},String(odC)));
    btn.onclick=()=>setState({tab:t.id,mob:false});
    tabsDiv.appendChild(btn);
  });
  nav.appendChild(tabsDiv);

  const rightBtns=h("div",{style:{display:"flex",gap:6,marginLeft:"auto",alignItems:"center"}});
  const copyBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px"}},"🔔 Kopiuj");
  copyBtn.onclick=()=>{
    const ov=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0);
    const ds=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)>=0&&dU(p.date)<=7);
    const cm=clientMap();
    const txt=["📊 PRZYPOMNIENIA","Data: "+fmtDate(TODAY.toISOString().slice(0,10)),"",
      ...(ov.length?["🔴 ZALEGŁE:",...ov.map(p=>`  • ${cm[p.clientId]?.name} — ${fmt(p.amount)}`)]:[] ),
      ...(ds.length?["\n🟡 NADCHODZĄCE:",...ds.map(p=>`  • ${cm[p.clientId]?.name} — ${fmt(p.amount)} (za ${dU(p.date)}d)`)]:[] )
    ].join("\n");
    navigator.clipboard.writeText(txt).then(()=>toast("Skopiowano 📋"));
  };
  rightBtns.appendChild(copyBtn);
  const logoutBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px",borderColor:"#3a0000",color:"#FF4444"}},"🔓 Wyloguj");
  logoutBtn.onclick=()=>setState({loggedIn:false});
  rightBtns.appendChild(logoutBtn);
  nav.appendChild(rightBtns);

  const mobBtn=h("button",{style:{marginLeft:8,background:"none",border:"1px solid #2a2a2a",color:"#fff",borderRadius:8,padding:"7px 11px",cursor:"pointer",display:"none",alignItems:"center",fontSize:13,fontWeight:700,fontFamily:"inherit"}},"☰");
  mobBtn.className="mob-btn";
  mobBtn.onclick=()=>setState({mob:!state.mob});
  nav.appendChild(mobBtn);
  app.appendChild(nav);

  // mob menu
  if(state.mob){
    const mm=h("div",{className:"mob-menu"});
    TABS.forEach(t=>{
      const active=state.tab===t.id;
      const btn=h("button",{style:{display:"block",width:"100%",background:active?"#150000":"none",border:"none",color:active?"#E60000":"#aaa",padding:"11px 14px",textAlign:"left",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,fontWeight:700}},t.icon," ",t.label);
      btn.onclick=()=>setState({tab:t.id,mob:false});
      mm.appendChild(btn);
    });
    const mbtns=h("div",{style:{borderTop:"1px solid #222",marginTop:8,paddingTop:8,display:"flex",gap:8}});
    const mc=h("button",{className:"btn-ghost",style:{fontSize:11}},"🔔");mc.onclick=copyBtn.onclick;
    const ml=h("button",{className:"btn-ghost",style:{fontSize:11,color:"#FF4444"}},"🔓 Wyloguj");ml.onclick=()=>setState({loggedIn:false});
    mbtns.appendChild(mc);mbtns.appendChild(ml);mm.appendChild(mbtns);
    app.appendChild(mm);
  }

  // main
  const main=h("div",{style:{padding:"18px",maxWidth:1100,margin:"0 auto"}});

  // reminder banner
  const cm2=clientMap();
  const ov2=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0);
  const ds2=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)>=0&&dU(p.date)<=3);
  if(ov2.length||ds2.length){
    const banner=h("div",{style:{background:"#120000",border:"1px solid rgba(230,0,0,.27)",borderLeft:"3px solid #E60000",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}});
    banner.appendChild(h("span",{style:{fontSize:16,flexShrink:0}},"🔔"));
    const bd=h("div",{});
    if(ov2.length)bd.appendChild(h("div",{style:{color:"#FF6666",fontSize:13,fontWeight:700,marginBottom:2}},`ZALEGŁE (${ov2.length}): ${ov2.map(p=>`${cm2[p.clientId]?.name} ${fmt(p.amount)}`).join(" · ")}`));
    if(ds2.length)bd.appendChild(h("div",{style:{color:"#FFB300",fontSize:12}},`Terminy ≤3 dni: ${ds2.map(p=>`${cm2[p.clientId]?.name} — ${fmt(p.amount)} (${dU(p.date)===0?"DZIŚ!":"za "+dU(p.date)+"d"})`).join(" · ")}`));
    banner.appendChild(bd);main.appendChild(banner);
  }

  // hint
  main.appendChild(h("div",{style:{background:"#111",border:"1px solid #222",borderRadius:8,padding:"7px 13px",marginBottom:14,fontSize:11,color:"#555",display:"flex",alignItems:"center",gap:7}},
    h("span",{style:{color:"#E60000"}},"✎"),
    h("span",{},h("b",{style:{color:"#aaa"}},"Inline editing:")," kliknij dowolną wartość → edytuj → Enter lub kliknij poza polem.")
  ));

  // tab content
  const tabEl={dashboard:renderDashboard,payments:renderPayments,clients:renderClients,costs:renderCosts,split:renderSplit,analytics:renderAnalytics}[state.tab];
  if(tabEl)main.appendChild(tabEl());
  app.appendChild(main);

  // modal
  const modalEl=renderModal();
  if(modalEl)app.appendChild(modalEl);

  // toasts
  if(state.toasts.length){
    const tc=h("div",{className:"toast-container"});
    state.toasts.forEach(t=>{
      const ok=t.type!=="error";
      tc.appendChild(h("div",{className:"toast",style:{background:ok?"#001a08":"#1a0000",border:`1px solid ${ok?"#00C85155":"#FF444466"}`,color:ok?"#00C851":"#FF6666"}},ok?"✓ ":"⚠ ",t.msg));
    });
    app.appendChild(tc);
  }
}

render();
</script>
</body>
</html>
