*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .2s,color .2s;}
:root{
  --bg0:#0a0a0a;--bg1:#111;--bg2:#181818;--bg3:#1e1e1e;

body.light{

input,select,button{font-family:inherit;}
input:focus,select:focus{outline:1px solid #E60000;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.shake{animation:shake .4s ease;}.fi{animation:fi .35s ease;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:#E60000;border-radius:50%;animation:spin .7s linear infinite;}
.nav-tabs{display:flex;flex:1;overflow-x:auto;}
.mob-menu{display:none;position:fixed;top:48px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:199;padding:8px;}

.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{padding:10px 12px;text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;white-space:nowrap;background:var(--bg0);}
th.sortable{cursor:pointer;user-select:none;}
th.sortable:hover{color:#E60000;}
td{padding:10px 12px;border-top:1px solid var(--bg3);font-size:13px;}
tr:hover td{background:var(--bg3);}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
.btn-red{background:#E60000;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ghost{background:none;border:1px solid var(--b2);color:var(--muted);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12px;}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:18px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.modal-box{background:var(--bg2);border:1px solid var(--b2);border-top:3px solid #E60000;border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.field-label{display:block;font-size:10px;color:var(--dim);margin-bottom:5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;}
.field-input,.field-select{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;}
.field-select option{background:var(--bg3);}
.editable{cursor:text;border-bottom:1px dashed var(--b2);padding-bottom:1px;display:inline-block;}
.editable:hover{border-bottom-color:#E60000;}
.edit-input,.edit-select{background:var(--bg3);border:1px solid #E60000;border-radius:5px;color:var(--text);font-size:13px;padding:3px 7px;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;max-width:300px;}
.filter-btn{border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#00C851;display:inline-block;margin-right:5px;}
.search-input{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:9px 11px 9px 34px;color:var(--text);font-size:13px;}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;}
@media(max-width:640px){
  .nav-tabs{display:none;}.mob-btn{display:flex!important;}
  .kpi-grid{grid-template-columns:1fr 1fr;}.two-col{grid-template-columns:1fr;}.three-col{grid-template-columns:1fr 1fr;}
}

// ── cookies (30 dni) ──────────────────────────────────────────────────────
function setCookie(name,value,days=30){
  const d=new Date();d.setTime(d.getTime()+days*24*60*60*1000);
  document.cookie=`${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Strict`;
}
function getCookie(name){
  const m=document.cookie.match(new RegExp(`(^| )${name}=([^;]+)`));
  return m?decodeURIComponent(m[2]):null;
}
function delCookie(name){document.cookie=`${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;}

const fmt=n=>new Intl.NumberFormat("pl-PL",{style:"currency",currency:"PLN",maximumFractionDigits:0}).format(n||0);
const fmtDate=d=>new Date(d).toLocaleDateString("pl-PL",{day:"2-digit",month:"short",year:"numeric"});
const TODAY=new Date("2026-05-13");
const dU=d=>Math.ceil((new Date(d)-TODAY)/86400000);
const uid=()=>Date.now()+Math.random();

const h=(tag,props,...children)=>{
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};

let state={
  loggedIn:!!getCookie("affd_auth"),
  loading:true,syncing:false,
  tab:"dashboard",
  clients:[],payments:[],costs:[],splitConfig:{a:50,b:25,c:25,nameA:"Wspólnik A",nameB:"Wspólnik B",nameC:"Wspólnik C"},
  modal:null,form:{},
  pf:"wszystkie",mob:false,toasts:[],
  search:"",dateFrom:"",dateTo:"",
  sortKey:"date",sortDir:"desc",
  theme:getCookie("affd_theme")||"dark",
  prevPayments:null,
};

document.body.className=state.theme==="light"?"light":"";

let saveTimer=null;
function saveToFirebase(){
  clearTimeout(saveTimer);state.syncing=true;render();
  saveTimer=setTimeout(async()=>{
    try{await setDoc(DATA_DOC,{clients:state.clients,payments:state.payments,costs:state.costs,splitConfig:state.splitConfig});}
    catch(e){toast("Błąd zapisu: "+e.message,"error");}
    state.syncing=false;render();
  },600);
}

let unsubscribe=null;
async function initFirebase(){
  try{
    const snap=await getDoc(DATA_DOC);
    if(!snap.exists()){
      await setDoc(DATA_DOC,DEFAULT_DATA);
      Object.assign(state,JSON.parse(JSON.stringify(DEFAULT_DATA)));
    } else {
      const d=snap.data();
      state.clients=d.clients||[];state.payments=d.payments||[];state.costs=d.costs||[];
      state.splitConfig=d.splitConfig||DEFAULT_DATA.splitConfig;
    }
  }catch(e){
    Object.assign(state,JSON.parse(JSON.stringify(DEFAULT_DATA)));
    toast("Tryb offline – dane lokalne","error");
  }
  state.loading=false;state.prevPayments=JSON.parse(JSON.stringify(state.payments));render();

  unsubscribe=onSnapshot(DATA_DOC,snap=>{
    if(!snap.exists()||state.syncing)return;
    const d=snap.data();
    const newPayments=d.payments||[];
    // wykryj nową płatność (powiadomienie wizualne)
    if(state.prevPayments&&newPayments.length>state.prevPayments.length){
      const added=newPayments.filter(p=>!state.prevPayments.find(x=>x.id===p.id));
      added.forEach(p=>{
        const cm=Object.fromEntries((d.clients||state.clients).map(c=>[c.id,c]));
        toast(`🔔 Nowa płatność: ${cm[p.clientId]?.name||"?"} — ${fmt(p.amount)}`);
      });
    }
    state.clients=d.clients||[];state.payments=newPayments;state.costs=d.costs||[];
    state.splitConfig=d.splitConfig||DEFAULT_DATA.splitConfig;
    state.prevPayments=JSON.parse(JSON.stringify(newPayments));
    if(state.loggedIn)render();
  });
}

function setState(patch){
  Object.assign(state,typeof patch==="function"?patch(state):patch);
  render();
}
function toast(msg,type="ok"){
  const id=uid();state.toasts=[...state.toasts,{id,msg,type}];render();
  setTimeout(()=>{state.toasts=state.toasts.filter(t=>t.id!==id);render();},3000);
}

function toggleTheme(){
  state.theme=state.theme==="dark"?"light":"dark";
  setCookie("affd_theme",state.theme,365);
  document.body.className=state.theme==="light"?"light":"";

function editableCell(value,onSave,opts={}){
  const{type="text",options,color,w=90}=opts;
  const wrap=h("span",{});
  function showDisplay(){
    wrap.innerHTML="";
    const sp=h("span",{className:"editable",style:{color:color||"",minWidth:w+"px"},title:"Kliknij aby edytować"},String(value));
    sp.onclick=()=>showEdit();wrap.appendChild(sp);
  }
  function showEdit(){
    wrap.innerHTML="";
    if(options){
      const sel=h("select",{className:"edit-select"});
      options.forEach(o=>{const op=document.createElement("option");op.value=o.v;op.textContent=o.l;if(o.v===value)op.selected=true;sel.appendChild(op);});
      sel.onchange=()=>{value=sel.value;onSave(sel.value);showDisplay();};
      sel.onblur=()=>showDisplay();wrap.appendChild(sel);setTimeout(()=>sel.focus(),0);
    }else{
      const inp=h("input",{className:"edit-input",type:type==="number"?"number":"text",value:String(value),style:{width:w+"px"}});
      const save=()=>{const v=type==="number"?+inp.value:inp.value;if(String(v)!==String(value)){value=v;onSave(v);}showDisplay();};
      inp.onblur=save;inp.onkeydown=e=>{if(e.key==="Enter")save();if(e.key==="Escape")showDisplay();};
      wrap.appendChild(inp);setTimeout(()=>inp.focus(),0);
    }
  }
  showDisplay();return wrap;
}

function calcs(){
  const{payments,costs,splitConfig}=state;
  const paid=payments.filter(p=>p.status==="oplacony");
  const pend=payments.filter(p=>p.status==="oczekujacy");
  const totR=paid.reduce((s,p)=>s+p.amount,0);
  const totP=pend.reduce((s,p)=>s+p.amount,0);
  const totC=costs.reduce((s,c)=>s+c.amount,0);
  const net=totR-totC;
  const sp={a:net*(splitConfig.a/100),b:net*(splitConfig.b/100),c:net*(splitConfig.c/100)};
  return{paid,pend,totR,totP,totC,net,sp};
}
function clientMap(){return Object.fromEntries(state.clients.map(c=>[c.id,c]));}

// ── PROGNOZA ──────────────────────────────────────────────────────────────
function calcForecast(){
  // średnia z ostatnich 3 miesięcy historii + obecny + planowane (nadchodzące)
  const histAvg=HIST.slice(-3).reduce((s,m)=>s+m.revenue,0)/3;
  const upcoming=state.payments.filter(p=>p.status==="nadchodzacy").reduce((s,p)=>s+p.amount,0);
  const pending=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)>=0).reduce((s,p)=>s+p.amount,0);
  return {avg:histAvg,upcoming,pending,forecast:Math.round((histAvg+upcoming+pending*0.7)/2*10)/10};
}

// ── CONFIRM DELETE ────────────────────────────────────────────────────────
function confirmDelete(msg,onConfirm){
  const bg=h("div",{className:"modal-bg"});
  const box=h("div",{style:{background:"var(--bg2)",border:"1px solid #3a0000",borderTop:"3px solid #E60000",borderRadius:14,padding:24,width:"100%",maxWidth:360,textAlign:"center"}});
  box.onclick=e=>e.stopPropagation();
  box.appendChild(h("div",{style:{fontSize:28,marginBottom:12}},"🗑️"));
  box.appendChild(h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1.5,marginBottom:8,color:"var(--text)"}},"POTWIERDZENIE USUNIĘCIA"));
  box.appendChild(h("div",{style:{fontSize:13,color:"var(--muted)",marginBottom:20,lineHeight:1.5}},msg));
  const btns=h("div",{style:{display:"flex",gap:10,justifyContent:"center"}});
  const cancel=h("button",{className:"btn-ghost",style:{padding:"10px 20px"}},"Anuluj");cancel.onclick=()=>bg.remove();
  const confirm=h("button",{style:{background:"#E60000",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}},"Tak, usuń");
  confirm.onclick=()=>{bg.remove();onConfirm();};
  btns.appendChild(cancel);btns.appendChild(confirm);box.appendChild(btns);bg.appendChild(box);
  document.getElementById("app").appendChild(bg);
}

// ── BACKUP ────────────────────────────────────────────────────────────────
function downloadBackup(){
  const data={exportDate:new Date().toISOString(),clients:state.clients,payments:state.payments,costs:state.costs,splitConfig:state.splitConfig};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`affiliatedesk-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast("Backup pobrany ✓");
}
function importBackup(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.clients||!data.payments||!data.costs){toast("Nieprawidłowy plik","error");return;}
        confirmDelete(`Wgrać backup z ${data.exportDate?new Date(data.exportDate).toLocaleDateString("pl-PL"):"?"}?\nNadpisze wszystkie obecne dane!`,()=>{
          state.clients=data.clients;state.payments=data.payments;state.costs=data.costs;
          if(data.splitConfig)state.splitConfig=data.splitConfig;
          saveToFirebase();toast("Backup wgrany ✓");render();
        });
      }catch{toast("Błąd odczytu","error");}
    };
    reader.readAsText(file);
  };inp.click();
}

// ── EKSPORT CSV ───────────────────────────────────────────────────────────
function exportCSV(){
  const cm=clientMap();
  const rows=[["Klient","Kwota","Data","Status","Forma","Notatka"],...state.payments.map(p=>[cm[p.clientId]?.name||"",p.amount,p.date,p.status,p.type,p.note||""])];
  const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`platnosci-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast("CSV pobrany ✓");
}

function renderLogin(){
  let pw="",show=false,err=false,shaking=false,remember=true;
  const wrap=h("div",{style:{minHeight:"100vh",background:"var(--bg0)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}});
  const inner=h("div",{className:"fi",style:{width:"100%",maxWidth:360}});wrap.appendChild(inner);
  function build(){
    inner.innerHTML="";
    inner.appendChild(h("div",{style:{textAlign:"center",marginBottom:32}},
      h("div",{style:{width:50,height:50,background:"#E60000",borderRadius:12,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',sans-serif",marginBottom:12}},"A"),

  if(modal==="client"){
    const nI=h("input",{className:"field-input",placeholder:"np. TechGear Pro…",value:form.name||""});nI.oninput=e=>form.name=e.target.value;box.appendChild(field("Nazwa *",nI));
    const tSel=h("select",{className:"field-select"});[{v:"miesieczny",l:"💰 Miesięczna"},{v:"prowizja",l:"% Prowizja"},{v:"mix",l:"🔀 Mix"}].forEach(o=>{const op=document.createElement("option");op.value=o.v;op.textContent=o.l;if((form.type||"miesieczny")===o.v)op.selected=true;tSel.appendChild(op);});tSel.onchange=e=>form.type=e.target.value;
    const rI=h("input",{className:"field-input",type:"number",placeholder:"0",value:form.rate||""});rI.oninput=e=>form.rate=e.target.value;
    box.appendChild(row2(field("Typ",tSel,true),field("Stawka",rI,true)));
    const ntI=h("input",{className:"field-input",placeholder:"Warunki, kontakt…",value:form.notes||""});ntI.oninput=e=>form.notes=e.target.value;box.appendChild(field("Notatki",ntI));
    const btns=h("div",{style:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:12}});
    const cancel=h("button",{className:"btn-ghost"},"Anuluj");cancel.onclick=()=>setState({modal:null,form:{}});
    const save=h("button",{className:"btn-red"},"Zapisz");
    save.onclick=()=>{if(!form.name){toast("Podaj nazwę","error");return;}const r={id:form.id||uid(),name:form.name,type:form.type||"miesieczny",rate:+form.rate||0,status:"aktywny",notes:form.notes||""};state.clients=form.id?state.clients.map(c=>c.id===form.id?r:c):[...state.clients,r];saveToFirebase();toast(form.id?"Zaktualizowano":"Dodano");setState({modal:null,form:{}});};
    btns.appendChild(cancel);btns.appendChild(save);box.appendChild(btns);
  }
  bg.appendChild(box);return bg;
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(state.loading){app.appendChild(h("div",{style:{minHeight:"100vh",background:"var(--bg0)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},h("div",{className:"spinner"}),h("div",{style:{color:"var(--dim)",fontSize:13}},"Łączenie z bazą danych…")));return;}
  if(!state.loggedIn){app.appendChild(renderLogin());return;}

  const nav=h("nav",{style:{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"0 18px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:200}});
  nav.appendChild(h("div",{style:{marginRight:14,padding:"10px 0",flexShrink:0,display:"flex",alignItems:"center",gap:7}},
    h("div",{style:{width:24,height:24,background:"#E60000",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff",fontFamily:"'Bebas Neue',sans-serif"}},"A"),
    h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,letterSpacing:2,color:"var(--text)"}},"AFFILIATE",h("span",{style:{color:"#E60000"}},"DESK")),
    h("span",{style:{background:"#E60000",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:3,color:"#fff"}},"PRO"),
    state.syncing?h("span",{style:{fontSize:11,color:"#FFB300",marginLeft:4}},"↑ sync…"):h("span",{style:{display:"inline-flex",alignItems:"center",fontSize:11,color:"#00C851",marginLeft:4}},h("span",{className:"sync-dot"}),"live")
  ));
  const TABS=[{id:"dashboard",icon:"◈",label:"Przegląd"},{id:"payments",icon:"◎",label:"Płatności"},{id:"clients",icon:"◉",label:"Klienci"},{id:"costs",icon:"◌",label:"Koszty"},{id:"split",icon:"◑",label:"Podział"},{id:"analytics",icon:"◐",label:"Analizy"}];
  const tabsDiv=h("div",{className:"nav-tabs"});
  const odC=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0).length;
  TABS.forEach(t=>{
    const active=state.tab===t.id;
    const btn=h("button",{style:{background:active?(state.theme==="light"?"#fee":"#150000"):"none",border:"none",color:active?"#E60000":"var(--dim)",padding:"14px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",borderBottom:active?"2px solid #E60000":"2px solid transparent",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}},t.icon," ",t.label);
    if(t.id==="payments"&&odC>0)btn.appendChild(h("span",{style:{background:"#E60000",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:10,fontWeight:800}},String(odC)));
    btn.onclick=()=>setState({tab:t.id,mob:false,search:""});tabsDiv.appendChild(btn);
  });
  nav.appendChild(tabsDiv);
  const rb=h("div",{style:{display:"flex",gap:6,marginLeft:"auto",alignItems:"center"}});
  const themeBtn=h("button",{className:"btn-ghost",style:{fontSize:13,padding:"5px 10px"},title:state.theme==="dark"?"Tryb jasny":"Tryb ciemny"},state.theme==="dark"?"☀️":"🌙");
  themeBtn.onclick=toggleTheme;rb.appendChild(themeBtn);
  const backupBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px"}},"💾 Backup");backupBtn.onclick=downloadBackup;rb.appendChild(backupBtn);
  const importBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px"}},"📥 Import");importBtn.onclick=importBackup;rb.appendChild(importBtn);
  const logoutBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px",borderColor:"#3a0000",color:"#FF4444"}},"🔓");
  logoutBtn.onclick=()=>{delCookie("affd_auth");setState({loggedIn:false});};rb.appendChild(logoutBtn);
  nav.appendChild(rb);
  const mobBtn=h("button",{style:{marginLeft:8,background:"none",border:"1px solid var(--b2)",color:"var(--text)",borderRadius:8,padding:"7px 11px",cursor:"pointer",display:"none",alignItems:"center",fontSize:13,fontWeight:700,fontFamily:"inherit"}},"☰");
  mobBtn.className="mob-btn";mobBtn.onclick=()=>setState({mob:!state.mob});nav.appendChild(mobBtn);app.appendChild(nav);

  if(state.mob){
    const mm=h("div",{className:"mob-menu",style:{display:"block"}});
    TABS.forEach(t=>{const a=state.tab===t.id;const btn=h("button",{style:{display:"block",width:"100%",background:a?"#150000":"none",border:"none",color:a?"#E60000":"var(--muted)",padding:"11px 14px",textAlign:"left",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,fontWeight:700}},t.icon," ",t.label);btn.onclick=()=>setState({tab:t.id,mob:false});mm.appendChild(btn);});
    const mb2=h("div",{style:{borderTop:"1px solid var(--border)",marginTop:8,paddingTop:8,display:"flex",gap:8,flexWrap:"wrap"}});
    const mt=h("button",{className:"btn-ghost",style:{fontSize:11}},state.theme==="dark"?"☀️":"🌙");mt.onclick=toggleTheme;
    const mb_=h("button",{className:"btn-ghost",style:{fontSize:11}},"💾");mb_.onclick=downloadBackup;
    const mi=h("button",{className:"btn-ghost",style:{fontSize:11}},"📥");mi.onclick=importBackup;
    const ml=h("button",{className:"btn-ghost",style:{fontSize:11,color:"#FF4444"}},"🔓 Wyloguj");ml.onclick=()=>{delCookie("affd_auth");setState({loggedIn:false});};
    mb2.appendChild(mt);mb2.appendChild(mb_);mb2.appendChild(mi);mb2.appendChild(ml);mm.appendChild(mb2);app.appendChild(mm);
  }

  const main=h("div",{style:{padding:"18px",maxWidth:1100,margin:"0 auto"}});
  const cm2=clientMap();
  const ov2=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0);
  const ds2=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)>=0&&dU(p.date)<=3);
  if(ov2.length||ds2.length){
    const banner=h("div",{style:{background:state.theme==="light"?"#ffeeee":"#120000",border:"1px solid rgba(230,0,0,.27)",borderLeft:"3px solid #E60000",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}});
    banner.appendChild(h("span",{style:{fontSize:16,flexShrink:0}},"🔔"));
    const bd=h("div",{});
    if(ov2.length)bd.appendChild(h("div",{style:{color:"#FF4444",fontSize:13,fontWeight:700,marginBottom:2}},`ZALEGŁE (${ov2.length}): ${ov2.map(p=>`${cm2[p.clientId]?.name} ${fmt(p.amount)}`).join(" · ")}`));
    if(ds2.length)bd.appendChild(h("div",{style:{color:"#cc8800",fontSize:12}},`Terminy ≤3 dni: ${ds2.map(p=>`${cm2[p.clientId]?.name} — ${fmt(p.amount)} (${dU(p.date)===0?"DZIŚ!":"za "+dU(p.date)+"d"})`).join(" · ")}`));
    banner.appendChild(bd);main.appendChild(banner);
  }

  const tabEl={dashboard:renderDashboard,payments:renderPayments,clients:renderClients,costs:renderCosts,split:renderSplit,analytics:renderAnalytics}[state.tab];
  if(tabEl)main.appendChild(tabEl());
  app.appendChild(main);
  const modalEl=renderModal();if(modalEl)app.appendChild(modalEl);
  if(state.toasts.length){
    const tc=h("div",{className:"toast-container"});
    state.toasts.forEach(t=>{const ok=t.type!=="error";tc.appendChild(h("div",{className:"toast",style:{background:ok?"#001a08":"#1a0000",border:`1px solid ${ok?"#00C85155":"#FF444466"}`,color:ok?"#00C851":"#FF6666"}},t.msg));});
    app.appendChild(tc);
  }
}

render();initFirebase();
</script>
</body>
</html>
