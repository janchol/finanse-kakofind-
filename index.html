<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KakoPay — Panel płatności</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;transition:background .2s,color .2s;}
:root{
  --bg0:#0a0a0a;--bg1:#111;--bg2:#181818;--bg3:#1e1e1e;
  --border:#222;--b2:#2a2a2a;--text:#fff;--muted:#aaa;--dim:#555;
}
body.light{
  --bg0:#f4f4f5;--bg1:#fff;--bg2:#f9f9f9;--bg3:#f0f0f0;
  --border:#e0e0e0;--b2:#d4d4d4;--text:#0a0a0a;--muted:#555;--dim:#888;
}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:var(--bg0);}::-webkit-scrollbar-thumb{background:#E60000;border-radius:2px;}
input,select,button{font-family:inherit;}
input:focus,select:focus{outline:1px solid #E60000;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.shake{animation:shake .4s ease;}.fi{animation:fi .35s ease;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:#E60000;border-radius:50%;animation:spin .7s linear infinite;}
.nav-tabs{display:flex;flex:1;overflow-x:auto;}
.mob-menu{display:none;position:fixed;top:48px;left:0;right:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:199;padding:8px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{padding:10px 12px;text-align:left;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;white-space:nowrap;background:var(--bg0);}
th.sortable{cursor:pointer;user-select:none;}
th.sortable:hover{color:#E60000;}
td{padding:10px 12px;border-top:1px solid var(--bg3);font-size:13px;}
tr:hover td{background:var(--bg3);}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
.btn-red{background:#E60000;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ghost{background:none;border:1px solid var(--b2);color:var(--muted);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12px;}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:18px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.modal-box{background:var(--bg2);border:1px solid var(--b2);border-top:3px solid #E60000;border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.field-label{display:block;font-size:10px;color:var(--dim);margin-bottom:5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;}
.field-input,.field-select{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;}
.field-select option{background:var(--bg3);}
.editable{cursor:text;border-bottom:1px dashed var(--b2);padding-bottom:1px;display:inline-block;}
.editable:hover{border-bottom-color:#E60000;}
.edit-input,.edit-select{background:var(--bg3);border:1px solid #E60000;border-radius:5px;color:var(--text);font-size:13px;padding:3px 7px;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;max-width:300px;}
.filter-btn{border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#00C851;display:inline-block;margin-right:5px;}
.search-input{width:100%;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:9px 11px 9px 34px;color:var(--text);font-size:13px;}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;}
@media(max-width:640px){
  .nav-tabs{display:none;}.mob-btn{display:flex!important;}
  .kpi-grid{grid-template-columns:1fr 1fr;}.two-col{grid-template-columns:1fr;}.three-col{grid-template-columns:1fr 1fr;}
}
</style>
</head>

// ── cookies (30 dni) ──────────────────────────────────────────────────────
function setCookie(name,value,days=30){
  const d=new Date();d.setTime(d.getTime()+days*24*60*60*1000);
  document.cookie=`${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/;SameSite=Strict`;
}
function getCookie(name){
  const m=document.cookie.match(new RegExp(`(^| )${name}=([^;]+)`));
  return m?decodeURIComponent(m[2]):null;
}
function delCookie(name){document.cookie=`${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;}

const fmt=n=>new Intl.NumberFormat("pl-PL",{style:"currency",currency:"PLN",maximumFractionDigits:0}).format(n||0);
const fmtDate=d=>new Date(d).toLocaleDateString("pl-PL",{day:"2-digit",month:"short",year:"numeric"});
const TODAY=new Date("2026-05-13");
const dU=d=>Math.ceil((new Date(d)-TODAY)/86400000);
const uid=()=>Date.now()+Math.random();

const h=(tag,props,...children)=>{
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};

let state={
  loggedIn:!!getCookie("affd_auth"),
  loading:true,syncing:false,
  tab:"dashboard",
  clients:[],payments:[],costs:[],splitConfig:{a:37.5,b:62.5,c:0,nameA:"Janchol",nameB:"Ponur",nameC:""},
  modal:null,form:{},
  pf:"wszystkie",mob:false,toasts:[],
  search:"",dateFrom:"",dateTo:"",
  sortKey:"date",sortDir:"desc",
  theme:getCookie("affd_theme")||"dark",
  prevPayments:null,
  notifEnabled:!!getCookie("affd_notif")&&typeof Notification!=="undefined"&&Notification.permission==="granted",
  calMonth:null,calSelected:null,
};

document.body.className=state.theme==="light"?"light":"";

let saveTimer=null;
function saveToFirebase(){
  clearTimeout(saveTimer);state.syncing=true;render();
  saveTimer=setTimeout(async()=>{
    try{await setDoc(DATA_DOC,{clients:state.clients,payments:state.payments,costs:state.costs,splitConfig:state.splitConfig});}
    catch(e){toast("Błąd zapisu: "+e.message,"error");}
    state.syncing=false;render();
  },600);
}

let unsubscribe=null;
async function initFirebase(){
  try{
    const snap=await getDoc(DATA_DOC);
    if(!snap.exists()){
      await setDoc(DATA_DOC,DEFAULT_DATA);
      Object.assign(state,JSON.parse(JSON.stringify(DEFAULT_DATA)));
    } else {
      const d=snap.data();
      state.clients=d.clients||[];state.payments=d.payments||[];state.costs=d.costs||[];
      state.splitConfig=d.splitConfig||DEFAULT_DATA.splitConfig;
      // migracja: usunięcie 3. wspólnika (matipapi)
      const sc=state.splitConfig;
      if(!sc.migrated2p){
        state.splitConfig={a:37.5,b:62.5,c:0,nameA:"Janchol",nameB:"Ponur",nameC:"",migrated2p:true};
        saveToFirebase();
      }
    }
  }catch(e){
    Object.assign(state,JSON.parse(JSON.stringify(DEFAULT_DATA)));
    toast("Tryb offline – dane lokalne","error");
  }
  state.loading=false;state.prevPayments=JSON.parse(JSON.stringify(state.payments));render();

  unsubscribe=onSnapshot(DATA_DOC,snap=>{
    if(!snap.exists()||state.syncing)return;
    const d=snap.data();
    const newPayments=d.payments||[];
    // wykryj nową płatność (powiadomienie wizualne)
    if(state.prevPayments&&newPayments.length>state.prevPayments.length){
      const added=newPayments.filter(p=>!state.prevPayments.find(x=>x.id===p.id));
      added.forEach(p=>{
        const cm=Object.fromEntries((d.clients||state.clients).map(c=>[c.id,c]));
        toast(`🔔 Nowa płatność: ${cm[p.clientId]?.name||"?"} — ${fmt(p.amount)}`);
      });
    }
    state.clients=d.clients||[];state.payments=newPayments;state.costs=d.costs||[];
    state.splitConfig=d.splitConfig||DEFAULT_DATA.splitConfig;
    state.prevPayments=JSON.parse(JSON.stringify(newPayments));
    if(state.loggedIn)render();
  });
}

function setState(patch){
  Object.assign(state,typeof patch==="function"?patch(state):patch);
  render();
}
function toast(msg,type="ok"){
  const id=uid();state.toasts=[...state.toasts,{id,msg,type}];render();
  setTimeout(()=>{state.toasts=state.toasts.filter(t=>t.id!==id);render();},3000);
}

function toggleTheme(){
  state.theme=state.theme==="dark"?"light":"dark";
  setCookie("affd_theme",state.theme,365);
  document.body.className=state.theme==="light"?"light":"";
  render();
}

// ── NOTYFIKACJE PRZEGLĄDARKI ─────────────────────────────────────────────
function getNotified(){try{return JSON.parse(localStorage.getItem("affd_notified")||"[]");}catch{return[];}}
function markNotified(key){const a=getNotified();if(!a.includes(key)){a.push(key);if(a.length>200)a.splice(0,a.length-200);localStorage.setItem("affd_notified",JSON.stringify(a));}}
async function toggleNotifications(){
  if(!("Notification" in window)){toast("Przeglądarka nie wspiera notyfikacji","error");return;}
  if(state.notifEnabled){delCookie("affd_notif");state.notifEnabled=false;toast("Notyfikacje wyłączone");render();return;}
  let perm=Notification.permission;
  if(perm==="default")perm=await Notification.requestPermission();
  if(perm==="granted"){setCookie("affd_notif","1",365);state.notifEnabled=true;toast("Notyfikacje włączone ✓");checkNotifications();render();}
  else{toast("Brak zgody na notyfikacje","error");}
}
function showNotification(title,body,key){
  if(!state.notifEnabled||Notification.permission!=="granted")return;
  if(getNotified().includes(key))return;
  try{new Notification(title,{body,tag:key});markNotified(key);}catch(e){}
}
function checkNotifications(){
  if(!state.notifEnabled||typeof Notification==="undefined"||Notification.permission!=="granted")return;
  const cm=clientMap();const k=TODAY.toISOString().slice(0,10);
  const odP=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0);
  const tdP=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)===0);
  const tmP=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)===1);
  const odC=state.costs.filter(c=>c.paid===false&&dU(c.date)<0);
  const duC=state.costs.filter(c=>c.paid===false&&dU(c.date)>=0&&dU(c.date)<=1);
  if(odP.length){const t=odP.reduce((s,p)=>s+p.amount,0);showNotification(`⚠️ ${odP.length} zaległych płatności`,`Suma: ${fmt(t)}\n`+odP.slice(0,3).map(p=>`• ${cm[p.clientId]?.name||"?"} — ${fmt(p.amount)}`).join("\n"),`od-pay-${k}-${odP.length}`);}
  if(tdP.length){const t=tdP.reduce((s,p)=>s+p.amount,0);showNotification(`📅 Płatność dziś (${tdP.length})`,`Suma: ${fmt(t)}\n`+tdP.slice(0,3).map(p=>`• ${cm[p.clientId]?.name||"?"} — ${fmt(p.amount)}`).join("\n"),`td-pay-${k}`);}
  if(tmP.length){showNotification(`🔔 Płatność jutro (${tmP.length})`,tmP.slice(0,3).map(p=>`• ${cm[p.clientId]?.name||"?"} — ${fmt(p.amount)}`).join("\n"),`tm-pay-${k}`);}
  if(odC.length){const t=odC.reduce((s,c)=>s+c.amount,0);showNotification(`⚠️ ${odC.length} zaległych kosztów`,`Suma: ${fmt(t)}\n`+odC.slice(0,3).map(c=>`• ${c.name} — ${fmt(c.amount)}`).join("\n"),`od-cost-${k}-${odC.length}`);}
  if(duC.length){showNotification(`💸 Koszt do zapłaty (${duC.length})`,duC.slice(0,3).map(c=>`• ${c.name} — ${fmt(c.amount)} (${dU(c.date)===0?"dziś":"jutro"})`).join("\n"),`du-cost-${k}-${duC.length}`);}
}

function badge(s){
  const m={oplacony:{l:"Opłacony",bg:"#001a0a",c:"#00C851"},oczekujacy:{l:"Oczekuje",bg:"#1a1000",c:"#FFB300"},nadchodzacy:{l:"Nadchodzi",bg:"#001020",c:"#4DA6FF"},aktywny:{l:"Aktywny",bg:"#001a0a",c:"#00C851"},zalegly:{l:"Zaległy",bg:"#1a0000",c:"#FF4444"}};
  const x=m[s]||m.oczekujacy;
  return h("span",{className:"badge",style:{background:x.bg,color:x.c,border:`1px solid ${x.c}33`}},h("span",{className:"badge-dot",style:{background:x.c}}),x.l);
}

function editableCell(value,onSave,opts={}){
  const{type="text",options,color,w=90}=opts;
  const wrap=h("span",{});
  function showDisplay(){
    wrap.innerHTML="";
    const sp=h("span",{className:"editable",style:{color:color||"",minWidth:w+"px"},title:"Kliknij aby edytować"},String(value));
    sp.onclick=()=>showEdit();wrap.appendChild(sp);
  }
  function showEdit(){
    wrap.innerHTML="";
    if(options){
      const sel=h("select",{className:"edit-select"});
      options.forEach(o=>{const op=document.createElement("option");op.value=o.v;op.textContent=o.l;if(o.v===value)op.selected=true;sel.appendChild(op);});
      sel.onchange=()=>{value=sel.value;onSave(sel.value);showDisplay();};
      sel.onblur=()=>showDisplay();wrap.appendChild(sel);setTimeout(()=>sel.focus(),0);
    }else{
      const inp=h("input",{className:"edit-input",type:type==="number"?"number":"text",value:String(value),style:{width:w+"px"}});
      const save=()=>{const v=type==="number"?+inp.value:inp.value;if(String(v)!==String(value)){value=v;onSave(v);}showDisplay();};
      inp.onblur=save;inp.onkeydown=e=>{if(e.key==="Enter")save();if(e.key==="Escape")showDisplay();};
      wrap.appendChild(inp);setTimeout(()=>inp.focus(),0);
    }
  }
  showDisplay();return wrap;
}

function calcs(){
  const{payments,costs,splitConfig}=state;
  const paid=payments.filter(p=>p.status==="oplacony");
  const pend=payments.filter(p=>p.status==="oczekujacy");
  const totR=paid.reduce((s,p)=>s+p.amount,0);
  const totP=pend.reduce((s,p)=>s+p.amount,0);
  const totC=costs.reduce((s,c)=>s+c.amount,0);
  const net=totR-totC;
  const sp={a:net*(splitConfig.a/100),b:net*(splitConfig.b/100),c:net*(splitConfig.c/100)};
  return{paid,pend,totR,totP,totC,net,sp};
}
function clientMap(){return Object.fromEntries(state.clients.map(c=>[c.id,c]));}

// ── MoM (miesiąc-do-miesiąca) ─────────────────────────────────────────────
function calcMonthAt(year,month){
  const ym=`${year}-${String(month+1).padStart(2,"0")}`;
  const pay=state.payments.filter(p=>p.date&&p.date.startsWith(ym));
  const cst=state.costs.filter(c=>c.date&&c.date.startsWith(ym));
  const totR=pay.filter(p=>p.status==="oplacony").reduce((s,p)=>s+p.amount,0);
  const totP=pay.filter(p=>p.status==="oczekujacy").reduce((s,p)=>s+p.amount,0);
  const totC=cst.reduce((s,c)=>s+c.amount,0);
  return {totR,totP,totC,net:totR-totC};
}
function momChange(curr,prev){
  if(curr===prev)return null;
  if(!prev)return {pct:100,up:curr>0};
  const pct=Math.round(((curr-prev)/Math.abs(prev))*100);
  return {pct:Math.abs(pct),up:pct>=0};
}

// ── PROGNOZA ──────────────────────────────────────────────────────────────
function calcForecast(){
  // średnia z ostatnich 3 miesięcy historii + obecny + planowane (nadchodzące)
  const histAvg=HIST.slice(-3).reduce((s,m)=>s+m.revenue,0)/3;
  const upcoming=state.payments.filter(p=>p.status==="nadchodzacy").reduce((s,p)=>s+p.amount,0);
  const pending=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)>=0).reduce((s,p)=>s+p.amount,0);
  return {avg:histAvg,upcoming,pending,forecast:Math.round((histAvg+upcoming+pending*0.7)/2*10)/10};
}

function kpi(label,value,sub,accent,icon){
  return h("div",{style:{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:12,padding:"16px 18px",borderTop:`3px solid ${accent}`,position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"absolute",top:10,right:12,fontSize:18,opacity:.08}},icon),
    h("div",{style:{fontSize:10,color:"var(--dim)",marginBottom:6,textTransform:"uppercase",letterSpacing:"1.2px",fontWeight:600}},label),
    h("div",{style:{fontSize:20,fontWeight:800,color:accent,marginBottom:2,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}},value),
    h("div",{style:{fontSize:11,color:"var(--dim)"}},sub)

// ── BACKUP ────────────────────────────────────────────────────────────────
function downloadBackup(){
  const data={exportDate:new Date().toISOString(),clients:state.clients,payments:state.payments,costs:state.costs,splitConfig:state.splitConfig};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`kakopay-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast("Backup pobrany ✓");
}
function importBackup(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.clients||!data.payments||!data.costs){toast("Nieprawidłowy plik","error");return;}
        confirmDelete(`Wgrać backup z ${data.exportDate?new Date(data.exportDate).toLocaleDateString("pl-PL"):"?"}?\nNadpisze wszystkie obecne dane!`,()=>{
          state.clients=data.clients;state.payments=data.payments;state.costs=data.costs;
          if(data.splitConfig)state.splitConfig=data.splitConfig;
          saveToFirebase();toast("Backup wgrany ✓");render();
        });
      }catch{toast("Błąd odczytu","error");}
    };
    reader.readAsText(file);
  };inp.click();
}

// ── ANALYTICS ────────────────────────────────────────────────────────────
function renderAnalytics(){

  const canvas=document.createElement("canvas");canvas.width=700;canvas.height=180;canvas.style.width="100%";canvas.style.height="auto";cw.appendChild(canvas);el.appendChild(cw);
  const chartData=[...HIST.map(m=>({...m,net:m.revenue-m.costs})),{month:"Maj",revenue:totR,costs:totC,net}];
  setTimeout(()=>{
    const ctx=canvas.getContext("2d");const W=700,H=180,PAD=40,BW=40,GAP=60;const maxV=Math.max(...chartData.map(d=>d.revenue))*1.1;
    ctx.clearRect(0,0,W,H);
    chartData.forEach((d,i)=>{
      const x=PAD+i*(BW*2+GAP);const rH=(d.revenue/maxV)*(H-40);const nH=(Math.max(0,d.net)/maxV)*(H-40);
      ctx.fillStyle="#00C85133";ctx.fillRect(x,H-20-rH,BW,rH);ctx.fillStyle="#00C851";ctx.fillRect(x,H-20-rH,BW,3);
      ctx.fillStyle="#E6000033";ctx.fillRect(x+BW+4,H-20-nH,BW,nH);ctx.fillStyle="#E60000";ctx.fillRect(x+BW+4,H-20-nH,BW,3);
      ctx.fillStyle=state.theme==="light"?"#666":"#777";ctx.font="11px sans-serif";ctx.textAlign="center";ctx.fillText(d.month,x+BW,H-4);
    });
    ctx.fillStyle="#00C851";ctx.fillRect(W-140,10,12,12);ctx.fillStyle=state.theme==="light"?"#666":"#777";ctx.font="11px sans-serif";ctx.textAlign="left";ctx.fillText("Przychody",W-124,21);
    ctx.fillStyle="#E60000";ctx.fillRect(W-140,28,12,12);ctx.fillStyle=state.theme==="light"?"#666":"#777";ctx.fillText("Zysk netto",W-124,39);
  },50);

  // wykres kołowy — przychody per klient
  const pieCard=h("div",{className:"card",style:{marginBottom:13}});
  pieCard.appendChild(h("h3",{style:{margin:"0 0 14px",fontSize:11,color:"var(--dim)",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"🥧 Przychody per klient"));
  const pieWrap=h("div",{style:{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}});
  const pieCanvas=document.createElement("canvas");pieCanvas.width=240;pieCanvas.height=240;pieCanvas.style.maxWidth="240px";pieCanvas.style.flexShrink=0;
  pieWrap.appendChild(pieCanvas);
  const clientTotals=state.clients.map(c=>({name:c.name,total:state.payments.filter(p=>p.clientId===c.id&&p.status==="oplacony").reduce((s,p)=>s+p.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const colors=["#E60000","#00C851","#4DA6FF","#FFB300","#BB86FC","#FF6B9D","#00D9D9","#FFEB3B"];
  const legend=h("div",{style:{flex:1,minWidth:180}});
  clientTotals.forEach((c,i)=>{
    const pct=totR?(c.total/totR*100).toFixed(1):0;
    legend.appendChild(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",fontSize:13}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},h("span",{style:{width:12,height:12,background:colors[i%colors.length],borderRadius:3,display:"inline-block"}}),h("span",{style:{color:"var(--text)"}},c.name)),
      h("span",{style:{fontWeight:700,color:colors[i%colors.length],fontFamily:"'Bebas Neue',sans-serif"}},`${pct}% · ${fmt(c.total)}`)
    ));
  });
  pieWrap.appendChild(legend);pieCard.appendChild(pieWrap);el.appendChild(pieCard);
  setTimeout(()=>{
    const ctx=pieCanvas.getContext("2d");const cx=120,cy=120,r=100;let a0=-Math.PI/2;
    const total=clientTotals.reduce((s,c)=>s+c.total,0);
    clientTotals.forEach((c,i)=>{

// ── KALENDARZ ────────────────────────────────────────────────────────────
function renderCalendar(){
  const el=h("div",{});
  if(!state.calMonth)state.calMonth=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,"0")}`;
  const [yr,mn]=state.calMonth.split("-").map(Number);
  const monthDate=new Date(yr,mn-1,1);
  const mNames=["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  const cm=clientMap();

  // header
  const hdr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:10}});
  hdr.appendChild(h("div",{},
    h("h2",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,margin:0,letterSpacing:2,color:"var(--text)"}},"KALENDARZ"),
    h("p",{style:{color:"var(--dim)",margin:"2px 0 0",fontSize:12}},"Płatności i koszty w skali miesiąca")
  ));
  const navBtns=h("div",{style:{display:"flex",gap:6,alignItems:"center"}});
  const prevBtn=h("button",{className:"btn-ghost",style:{padding:"7px 11px"}},"←");
  prevBtn.onclick=()=>{const d=new Date(yr,mn-2,1);state.calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;state.calSelected=null;render();};
  const todayBtn=h("button",{className:"btn-ghost",style:{padding:"7px 13px"}},"Dziś");
  todayBtn.onclick=()=>{state.calMonth=`${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,"0")}`;state.calSelected=null;render();};
  const nextBtn=h("button",{className:"btn-ghost",style:{padding:"7px 11px"}},"→");
  nextBtn.onclick=()=>{const d=new Date(yr,mn,1);state.calMonth=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;state.calSelected=null;render();};
  navBtns.appendChild(prevBtn);navBtns.appendChild(todayBtn);navBtns.appendChild(nextBtn);
  hdr.appendChild(navBtns);
  el.appendChild(hdr);

  // tytuł miesiąca
  el.appendChild(h("div",{className:"card",style:{marginBottom:14,padding:"12px 18px",textAlign:"center"}},
    h("div",{style:{fontSize:22,fontWeight:800,color:"var(--text)",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2}},`${mNames[mn-1].toUpperCase()} ${yr}`)
  ));

  // grupowanie wpisów
  const itemsByDay={};
  state.payments.forEach(p=>{
    if(p.date&&p.date.startsWith(state.calMonth)){
      const day=parseInt(p.date.slice(8,10));
      if(!itemsByDay[day])itemsByDay[day]={payments:[],costs:[]};
      itemsByDay[day].payments.push(p);
    }
  });
  state.costs.forEach(c=>{
    if(c.date&&c.date.startsWith(state.calMonth)){
      const day=parseInt(c.date.slice(8,10));
      if(!itemsByDay[day])itemsByDay[day]={payments:[],costs:[]};
      itemsByDay[day].costs.push(c);
    }
  });

  // sumy miesiąca
  let mR=0,mP=0,mC=0,mCpaid=0;
  Object.values(itemsByDay).forEach(({payments,costs})=>{
    payments.forEach(p=>{if(p.status==="oplacony")mR+=p.amount;else if(p.status==="oczekujacy")mP+=p.amount;});
    costs.forEach(c=>{mC+=c.amount;if(c.paid!==false)mCpaid+=c.amount;});
  });
  const sumStrip=h("div",{className:"kpi-grid",style:{marginBottom:14}});
  sumStrip.appendChild(kpi("Przychody (opł.)",fmt(mR),"w tym miesiącu","#00C851","💰"));
  sumStrip.appendChild(kpi("Oczekuje",fmt(mP),"w tym miesiącu","#FFB300","⏳"));
  sumStrip.appendChild(kpi("Koszty",fmt(mC),`${fmt(mCpaid)} opłaconych`,"#E60000","💸"));
  sumStrip.appendChild(kpi("Bilans",fmt(mR-mC),"przychód − koszty","#4DA6FF","📊"));
  el.appendChild(sumStrip);

  // siatka kalendarza
  const card=h("div",{className:"card",style:{padding:10}});
  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}});
  ["Pn","Wt","Śr","Cz","Pt","Sb","Nd"].forEach(d=>{
    grid.appendChild(h("div",{style:{padding:"6px 4px",fontSize:10,color:"var(--dim)",fontWeight:700,textTransform:"uppercase",letterSpacing:1,textAlign:"center"}},d));
  });

  const firstDayWeekday=(monthDate.getDay()+6)%7;
  const daysInMonth=new Date(yr,mn,0).getDate();
  for(let i=0;i<firstDayWeekday;i++){grid.appendChild(h("div",{style:{minHeight:78}}));}

  const todayStr=TODAY.toISOString().slice(0,10);
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${state.calMonth}-${String(day).padStart(2,"0")}`;
    const isToday=dateStr===todayStr;
    const isSelected=state.calSelected===day;
    const items=itemsByDay[day]||{payments:[],costs:[]};
    const hasItems=items.payments.length>0||items.costs.length>0;
    let bg="var(--bg0)",bd="1px solid var(--bg3)";
    if(isSelected){bg=state.theme==="light"?"#fee":"#150000";bd="1px solid #E60000";}
    else if(isToday){bg=state.theme==="light"?"#fff5f5":"#1a0808";bd="1px solid #E6000055";}
    const cell=h("div",{style:{minHeight:78,padding:"5px 6px",borderRadius:6,background:bg,border:bd,cursor:hasItems?"pointer":"default",display:"flex",flexDirection:"column",gap:2,transition:"background .15s"}});
    cell.appendChild(h("div",{style:{fontSize:11,fontWeight:isToday?800:600,color:isToday?"#E60000":"var(--text)",textAlign:"right"}},String(day)));
    if(items.payments.length){
      const paidSum=items.payments.filter(p=>p.status==="oplacony").reduce((s,p)=>s+p.amount,0);
      const pendSum=items.payments.filter(p=>p.status==="oczekujacy").reduce((s,p)=>s+p.amount,0);
      if(paidSum>0)cell.appendChild(h("div",{style:{fontSize:10,color:"#00C851",fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},`+${fmt(paidSum)}`));
      if(pendSum>0)cell.appendChild(h("div",{style:{fontSize:10,color:"#FFB300",fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},`+${fmt(pendSum)} ⏳`));
    }
    if(items.costs.length){
      const cSum=items.costs.reduce((s,c)=>s+c.amount,0);
      const allPaid=items.costs.every(c=>c.paid!==false);
      cell.appendChild(h("div",{style:{fontSize:10,color:allPaid?"#E60000":"#FFB300",fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},`-${fmt(cSum)}${allPaid?"":" ⚠"}`));
    }
    if(hasItems)cell.onclick=()=>{state.calSelected=day;render();};
    grid.appendChild(cell);
  }
  card.appendChild(grid);
  el.appendChild(card);

  // legenda
  const legend=h("div",{style:{display:"flex",gap:14,flexWrap:"wrap",padding:"10px 4px",fontSize:11,color:"var(--dim)"}});
  [["#00C851","Płatność opłacona"],["#FFB300","Płatność oczekuje / koszt do zapłaty"],["#E60000","Koszt opłacony"]].forEach(([c,l])=>{
    legend.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:5}},
      h("span",{style:{width:8,height:8,background:c,borderRadius:2,display:"inline-block"}}),l
    ));
  });
  el.appendChild(legend);

  // szczegóły wybranego dnia
  if(state.calSelected){
    const items=itemsByDay[state.calSelected]||{payments:[],costs:[]};
    const dateStr=`${state.calMonth}-${String(state.calSelected).padStart(2,"0")}`;
    const detail=h("div",{className:"card",style:{marginTop:14}});
    const dh=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}});
    dh.appendChild(h("h3",{style:{margin:0,fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:1.5,color:"var(--text)"}},`📅 ${fmtDate(dateStr)}`));
    const closeBtn=h("button",{style:{background:"none",border:"none",color:"var(--dim)",fontSize:16,cursor:"pointer"}},"✕");
    closeBtn.onclick=()=>{state.calSelected=null;render();};
    dh.appendChild(closeBtn);
    detail.appendChild(dh);
    if(items.payments.length){
      detail.appendChild(h("div",{style:{fontSize:10,color:"var(--dim)",marginBottom:6,textTransform:"uppercase",letterSpacing:1.2,fontWeight:700}},"💰 Płatności"));
      items.payments.forEach(p=>{
        const row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--bg3)",gap:8,flexWrap:"wrap"}});
        row.appendChild(h("div",{style:{minWidth:0,flex:1}},
          h("div",{style:{fontSize:13,fontWeight:600,color:"var(--text)"}},cm[p.clientId]?.name||"—"),
          p.note?h("div",{style:{fontSize:11,color:"var(--dim)",marginTop:1}},p.note):null
        ));
        row.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
          h("span",{style:{fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",color:"#00C851"}},fmt(p.amount)),
          badge(p.status)
        ));
        detail.appendChild(row);
      });
    }
    if(items.costs.length){
      detail.appendChild(h("div",{style:{fontSize:10,color:"var(--dim)",margin:"14px 0 6px",textTransform:"uppercase",letterSpacing:1.2,fontWeight:700}},"💸 Koszty"));
      items.costs.forEach(c=>{
        const isPaid=c.paid!==false;
        const row=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--bg3)",gap:8,flexWrap:"wrap"}});
        row.appendChild(h("div",{style:{minWidth:0,flex:1}},
          h("div",{style:{fontSize:13,fontWeight:600,color:"var(--text)"}},c.name),
          h("div",{style:{fontSize:11,color:"var(--dim)",marginTop:1}},c.category)
        ));
        const sBadge=h("span",{style:{background:isPaid?"#001a0a":"#1a1000",color:isPaid?"#00C851":"#FFB300",border:`1px solid ${isPaid?"#00C85155":"#FFB30055"}`,borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700}},isPaid?"Opłacony":"Do zapłaty");
        row.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},
          h("span",{style:{fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",color:"#E60000"}},fmt(c.amount)),
          sBadge
        ));
        detail.appendChild(row);
      });
    }
    if(!items.payments.length&&!items.costs.length){
      detail.appendChild(h("div",{style:{color:"var(--dim)",fontSize:13,textAlign:"center",padding:20}},"Brak wpisów"));
    }
    el.appendChild(detail);
  }
  return el;
}

    const cancel=h("button",{className:"btn-ghost"},"Anuluj");cancel.onclick=()=>setState({modal:null,form:{}});
    const save=h("button",{className:"btn-red"},"Zapisz");
    save.onclick=()=>{if(!form.name){toast("Podaj nazwę","error");return;}const r={id:form.id||uid(),name:form.name,type:form.type||"miesieczny",rate:+form.rate||0,status:"aktywny",notes:form.notes||""};state.clients=form.id?state.clients.map(c=>c.id===form.id?r:c):[...state.clients,r];saveToFirebase();toast(form.id?"Zaktualizowano":"Dodano");setState({modal:null,form:{}});};
    btns.appendChild(cancel);btns.appendChild(save);box.appendChild(btns);
  }
  bg.appendChild(box);return bg;
}

// ── MAIN RENDER ──────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  if(state.loading){app.appendChild(h("div",{style:{minHeight:"100vh",background:"var(--bg0)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},h("div",{className:"spinner"}),h("div",{style:{color:"var(--dim)",fontSize:13}},"Łączenie z bazą danych…")));return;}
  if(!state.loggedIn){app.appendChild(renderLogin());return;}

  const nav=h("nav",{style:{background:"var(--bg2)",borderBottom:"1px solid var(--border)",padding:"0 18px",display:"flex",alignItems:"center",position:"sticky",top:0,zIndex:200}});
  nav.appendChild(h("div",{style:{marginRight:14,padding:"10px 0",flexShrink:0,display:"flex",alignItems:"center",gap:7}},
    h("div",{style:{width:24,height:24,background:"#E60000",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#fff",fontFamily:"'Bebas Neue',sans-serif"}},"₽"),
    h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,letterSpacing:2,color:"var(--text)"}},"KAKO",h("span",{style:{color:"#E60000"}},"PAY")),
    h("span",{style:{background:"#E60000",fontSize:8,fontWeight:800,padding:"1px 5px",borderRadius:3,color:"#fff"}},"PRO"),
    state.syncing?h("span",{style:{fontSize:11,color:"#FFB300",marginLeft:4}},"↑ sync…"):h("span",{style:{display:"inline-flex",alignItems:"center",fontSize:11,color:"#00C851",marginLeft:4}},h("span",{className:"sync-dot"}),"live")
  ));
  const TABS=[{id:"dashboard",icon:"◈",label:"Przegląd"},{id:"payments",icon:"◎",label:"Płatności"},{id:"clients",icon:"◉",label:"Klienci"},{id:"costs",icon:"◌",label:"Koszty"},{id:"calendar",icon:"📅",label:"Kalendarz"},{id:"split",icon:"◑",label:"Podział"},{id:"analytics",icon:"◐",label:"Analizy"}];
  const tabsDiv=h("div",{className:"nav-tabs"});
  const odC=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0).length;
  TABS.forEach(t=>{
    const active=state.tab===t.id;
    const btn=h("button",{style:{background:active?(state.theme==="light"?"#fee":"#150000"):"none",border:"none",color:active?"#E60000":"var(--dim)",padding:"14px 11px",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",borderBottom:active?"2px solid #E60000":"2px solid transparent",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}},t.icon," ",t.label);
    if(t.id==="payments"&&odC>0)btn.appendChild(h("span",{style:{background:"#E60000",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:10,fontWeight:800}},String(odC)));
    btn.onclick=()=>setState({tab:t.id,mob:false,search:""});tabsDiv.appendChild(btn);
  });
  nav.appendChild(tabsDiv);
  const rb=h("div",{style:{display:"flex",gap:6,marginLeft:"auto",alignItems:"center"}});
  const notifBtn=h("button",{className:"btn-ghost",style:{fontSize:13,padding:"5px 10px",borderColor:state.notifEnabled?"#00C85155":"var(--b2)",color:state.notifEnabled?"#00C851":"var(--muted)"},title:state.notifEnabled?"Notyfikacje włączone — kliknij aby wyłączyć":"Włącz notyfikacje przeglądarki"},state.notifEnabled?"🔔":"🔕");
  notifBtn.onclick=toggleNotifications;rb.appendChild(notifBtn);
  const themeBtn=h("button",{className:"btn-ghost",style:{fontSize:13,padding:"5px 10px"},title:state.theme==="dark"?"Tryb jasny":"Tryb ciemny"},state.theme==="dark"?"☀️":"🌙");
  themeBtn.onclick=toggleTheme;rb.appendChild(themeBtn);
  const backupBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px"}},"💾 Backup");backupBtn.onclick=downloadBackup;rb.appendChild(backupBtn);
  const importBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px"}},"📥 Import");importBtn.onclick=importBackup;rb.appendChild(importBtn);
  const logoutBtn=h("button",{className:"btn-ghost",style:{fontSize:11,padding:"5px 10px",borderColor:"#3a0000",color:"#FF4444"}},"🔓");
  logoutBtn.onclick=()=>{delCookie("affd_auth");setState({loggedIn:false});};rb.appendChild(logoutBtn);
  nav.appendChild(rb);
  const mobBtn=h("button",{style:{marginLeft:8,background:"none",border:"1px solid var(--b2)",color:"var(--text)",borderRadius:8,padding:"7px 11px",cursor:"pointer",display:"none",alignItems:"center",fontSize:13,fontWeight:700,fontFamily:"inherit"}},"☰");
  mobBtn.className="mob-btn";mobBtn.onclick=()=>setState({mob:!state.mob});nav.appendChild(mobBtn);app.appendChild(nav);

  if(state.mob){
    const mm=h("div",{className:"mob-menu",style:{display:"block"}});
    TABS.forEach(t=>{const a=state.tab===t.id;const btn=h("button",{style:{display:"block",width:"100%",background:a?"#150000":"none",border:"none",color:a?"#E60000":"var(--muted)",padding:"11px 14px",textAlign:"left",cursor:"pointer",fontSize:13,fontFamily:"inherit",borderRadius:8,fontWeight:700}},t.icon," ",t.label);btn.onclick=()=>setState({tab:t.id,mob:false});mm.appendChild(btn);});
    const mb2=h("div",{style:{borderTop:"1px solid var(--border)",marginTop:8,paddingTop:8,display:"flex",gap:8,flexWrap:"wrap"}});
    const mt=h("button",{className:"btn-ghost",style:{fontSize:11}},state.theme==="dark"?"☀️":"🌙");mt.onclick=toggleTheme;
    const mn_=h("button",{className:"btn-ghost",style:{fontSize:11,color:state.notifEnabled?"#00C851":"var(--muted)"}},state.notifEnabled?"🔔":"🔕");mn_.onclick=toggleNotifications;
    const mb_=h("button",{className:"btn-ghost",style:{fontSize:11}},"💾");mb_.onclick=downloadBackup;
    const mi=h("button",{className:"btn-ghost",style:{fontSize:11}},"📥");mi.onclick=importBackup;
    const ml=h("button",{className:"btn-ghost",style:{fontSize:11,color:"#FF4444"}},"🔓 Wyloguj");ml.onclick=()=>{delCookie("affd_auth");setState({loggedIn:false});};
    mb2.appendChild(mt);mb2.appendChild(mn_);mb2.appendChild(mb_);mb2.appendChild(mi);mb2.appendChild(ml);mm.appendChild(mb2);app.appendChild(mm);
  }

  const main=h("div",{style:{padding:"18px",maxWidth:1100,margin:"0 auto"}});
  const cm2=clientMap();
  const ov2=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)<0);
  const ds2=state.payments.filter(p=>p.status==="oczekujacy"&&dU(p.date)>=0&&dU(p.date)<=3);
  if(ov2.length||ds2.length){
    const banner=h("div",{style:{background:state.theme==="light"?"#ffeeee":"#120000",border:"1px solid rgba(230,0,0,.27)",borderLeft:"3px solid #E60000",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}});
    banner.appendChild(h("span",{style:{fontSize:16,flexShrink:0}},"🔔"));
    const bd=h("div",{});
    if(ov2.length)bd.appendChild(h("div",{style:{color:"#FF4444",fontSize:13,fontWeight:700,marginBottom:2}},`ZALEGŁE (${ov2.length}): ${ov2.map(p=>`${cm2[p.clientId]?.name} ${fmt(p.amount)}`).join(" · ")}`));
    if(ds2.length)bd.appendChild(h("div",{style:{color:"#cc8800",fontSize:12}},`Terminy ≤3 dni: ${ds2.map(p=>`${cm2[p.clientId]?.name} — ${fmt(p.amount)} (${dU(p.date)===0?"DZIŚ!":"za "+dU(p.date)+"d"})`).join(" · ")}`));
    banner.appendChild(bd);main.appendChild(banner);
  }

  const tabEl={dashboard:renderDashboard,payments:renderPayments,clients:renderClients,costs:renderCosts,calendar:renderCalendar,split:renderSplit,analytics:renderAnalytics}[state.tab];
  if(tabEl)main.appendChild(tabEl());
  app.appendChild(main);
  const modalEl=renderModal();if(modalEl)app.appendChild(modalEl);
  if(state.toasts.length){
    const tc=h("div",{className:"toast-container"});
    state.toasts.forEach(t=>{const ok=t.type!=="error";tc.appendChild(h("div",{className:"toast",style:{background:ok?"#001a08":"#1a0000",border:`1px solid ${ok?"#00C85155":"#FF444466"}`,color:ok?"#00C851":"#FF6666"}},t.msg));});
    app.appendChild(tc);
  }
}

render();initFirebase().then(()=>{if(state.notifEnabled)setTimeout(checkNotifications,1500);});
setInterval(()=>{if(state.notifEnabled)checkNotifications();},5*60*1000);
</script>
</body>
</html>
