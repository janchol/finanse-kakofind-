<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0a0a0a;}
::-webkit-scrollbar-thumb{background:#E60000;border-radius:2px;}
input,select,button{font-family:inherit;}
input:focus,select:focus{outline:1px solid #E60000;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.shake{animation:shake .4s ease;}
.fi{animation:fi .35s ease;}
.spinner{width:40px;height:40px;border:3px solid #222;border-top-color:#E60000;border-radius:50%;animation:spin .7s linear infinite;}
.nav-tabs{display:flex;flex:1;overflow-x:auto;}
.mob-menu{display:none;position:fixed;top:48px;left:0;right:0;background:#181818;border-bottom:1px solid #222;z-index:199;padding:8px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{padding:10px 12px;text-align:left;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;white-space:nowrap;background:#0a0a0a;}
td{padding:10px 12px;border-top:1px solid #1e1e1e;font-size:13px;}
tr:hover td{background:#141414;}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;}
.badge-dot{width:5px;height:5px;border-radius:50%;display:inline-block;}
.btn-red{background:#E60000;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;}
.btn-ghost{background:none;border:1px solid #2a2a2a;color:#aaa;border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12px;}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:18px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);}
.modal-box{background:#181818;border:1px solid #2a2a2a;border-top:3px solid #E60000;border-radius:14px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.field-label{display:block;font-size:10px;color:#555;margin-bottom:5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600;}
.field-input{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;color:#fff;font-size:13px;}
.field-select{width:100%;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:9px 11px;color:#fff;font-size:13px;}
.field-select option{background:#1e1e1e;}
.editable{cursor:text;border-bottom:1px dashed #2a2a2a;padding-bottom:1px;display:inline-block;}
.editable:hover{border-bottom-color:#E60000;}
.edit-input{background:#1e1e1e;border:1px solid #E60000;border-radius:5px;color:#fff;font-size:13px;padding:3px 7px;}
.edit-select{background:#1e1e1e;border:1px solid #E60000;border-radius:5px;color:#fff;font-size:13px;padding:2px 6px;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;max-width:300px;}
.filter-btn{border-radius:6px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#00C851;display:inline-block;margin-right:5px;}
@media(max-width:640px){
  .nav-tabs{display:none;}
  .mob-btn{display:flex!important;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .two-col{grid-template-columns:1fr;}
  .three-col{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ── Firebase config ────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCPBb4PMfNkx9_OlzEX_OECw5aq2xF9CNQ",
  authDomain: "affiliatedesk-7d1e4.firebaseapp.com",
  projectId: "affiliatedesk-7d1e4",
  storageBucket: "affiliatedesk-7d1e4.firebasestorage.app",
  messagingSenderId: "934024720962",
  appId: "1:934024720962:web:7eb9bf9d2681e60bdbb3db"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DATA_DOC = doc(db, "app", "data");

// ── dane startowe ──────────────────────────────────────────────────────────
const PASSWORD = "Kako#9Rx!mZ4@vQ";
const DEFAULT_DATA = {
  clients:[{id:1,name:"TechGear Pro",type:"prowizja",rate:12,status:"aktywny",notes:"12% od sprzedaży"},{id:2,name:"FashionHub",type:"prowizja",rate:8,status:"aktywny",notes:"8% od sprzedaży"},{id:3,name:"NutriBrand",type:"prowizja",rate:15,status:"aktywny",notes:"15% od sprzedaży"},{id:4,name:"StyleCo",type:"miesieczny",rate:2400,status:"aktywny",notes:"Stała miesięczna"},{id:5,name:"GadgetWorld",type:"miesieczny",rate:1800,status:"aktywny",notes:"Częściowo w produktach"},{id:6,name:"BeautyLine",type:"miesieczny",rate:1200,status:"oczekujacy",notes:"Negocjacje"}],
  payments:[{id:1,clientId:1,amount:8400,date:"2026-04-15",status:"oplacony",type:"gotowka",note:"Kwiecień"},{id:2,clientId:2,amount:3200,date:"2026-04-22",status:"oplacony",type:"gotowka",note:"Kwiecień"},{id:3,clientId:4,amount:2400,date:"2026-05-01",status:"oplacony",type:"gotowka",note:"Maj"},{id:4,clientId:5,amount:900,date:"2026-05-01",status:"oplacony",type:"produkt",note:"Słuchawki"},{id:5,clientId:5,amount:900,date:"2026-05-01",status:"oplacony",type:"gotowka",note:"Reszta maja"},{id:6,clientId:3,amount:6750,date:"2026-05-10",status:"oczekujacy",type:"gotowka",note:"Maj"},{id:7,clientId:1,amount:9100,date:"2026-05-15",status:"oczekujacy",type:"gotowka",note:"Maj"},{id:8,clientId:2,amount:2900,date:"2026-05-22",status:"oczekujacy",type:"gotowka",note:"Maj"},{id:9,clientId:4,amount:2400,date:"2026-06-01",status:"nadchodzacy",type:"gotowka",note:"Czerwiec"},{id:10,clientId:6,amount:1200,date:"2026-06-01",status:"nadchodzacy",type:"gotowka",note:"Start"}],
  costs:[{id:1,name:"Hosting & domeny",amount:180,category:"tech",date:"2026-05-01",recurring:true},{id:2,name:"Narzędzia marketingowe",amount:320,category:"tech",date:"2026-05-01",recurring:true},{id:3,name:"Obsługa księgowa",amount:450,category:"uslugi",date:"2026-05-05",recurring:true},{id:4,name:"Reklama własna",amount:600,category:"marketing",date:"2026-05-08",recurring:false},{id:5,name:"Sprzęt biurowy",amount:240,category:"inne",date:"2026-04-20",recurring:false}]
};
const HIST=[{month:"Sty",revenue:19800,costs:1200},{month:"Lut",revenue:22600,costs:1350},{month:"Mar",revenue:17400,costs:1550},{month:"Kwi",revenue:25200,costs:1490}];

// ── helpers ────────────────────────────────────────────────────────────────
const fmt=n=>new Intl.NumberFormat("pl-PL",{style:"currency",currency:"PLN",maximumFractionDigits:0}).format(n||0);
const fmtDate=d=>new Date(d).toLocaleDateString("pl-PL",{day:"2-digit",month:"short",year:"numeric"});
const TODAY=new Date("2026-05-13");
const dU=d=>Math.ceil((new Date(d)-TODAY)/86400000);
const uid=()=>Date.now()+Math.random();

const h=(tag,props,...children)=>{
  const el=document.createElement(tag);
  if(props)Object.entries(props).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};

// ── state ──────────────────────────────────────────────────────────────────
let state={
  loggedIn:false,
  loading:true,
  syncing:false,
  tab:"dashboard",
  clients:[],payments:[],costs:[],
  modal:null,form:{},
  pf:"wszystkie",mob:false,toasts:[],
};

// ── Firebase save (debounced) ──────────────────────────────────────────────
let saveTimer=null;
function saveToFirebase(){
  clearTimeout(saveTimer);
  state.syncing=true;
  render();
  saveTimer=setTimeout(async()=>{
    try{
      await setDoc(DATA_DOC,{clients:state.clients,payments:state.payments,costs:state.costs});
    }catch(e){toast("Błąd zapisu: "+e.message,"error");}
    state.syncing=false;
    render();
  },600);
}

// ── load + realtime listener ───────────────────────────────────────────────
let unsubscribe=null;
async function initFirebase(){
  try{
    const snap=await getDoc(DATA_DOC);
    if(!snap.exists()){
      await setDoc(DATA_DOC,DEFAULT_DATA);
      state.clients=JSON.parse(JSON.stringify(DEFAULT_DATA.clients));
      state.payments=JSON.parse(JSON.stringify(DEFAULT_DATA.payments));
      state.costs=JSON.parse(JSON.stringify(DEFAULT_DATA.costs));
    } else {
      const d=snap.data();
      state.clients=d.clients||[];
      state.payments=d.payments||[];
      state.costs=d.costs||[];
    }
  }catch(e){
    state.clients=JSON.parse(JSON.stringify(DEFAULT_DATA.clients));
    state.payments=JSON.parse(JSON.stringify(DEFAULT_DATA.payments));
    state.costs=JSON.parse(JSON.stringify(DEFAULT_DATA.costs));
    toast("Tryb offline – dane lokalne","error");
  }
  state.loading=false;
  render();

  // realtime listener — aktualizuje gdy ktoś inny zmieni dane
  unsubscribe=onSnapshot(DATA_DOC,snap=>{
    if(!snap.exists()||state.syncing)return;
    const d=snap.data();
    state.clients=d.clients||[];
    state.payments=d.payments||[];
    state.costs=d.costs||[];
    if(state.loggedIn)render();
  });
}

function setState(patch){
  const prev=typeof patch==="function"?patch(state):patch;
  Object.assign(state,prev);
  render();
}

function toast(msg,type="ok"){
  const id=uid();
  state.toasts=[...state.toasts,{id,msg,type}];
  render();
  setTimeout(()=>{state.toasts=state.toasts.filter(t=>t.id!==id);render();},2800);
}

// ── badge ──────────────────────────────────────────────────────────────────
function badge(s){
  const m={oplacony:{l:"Opłacony",bg:"#001a0a",c:"#00C851"},oczekujacy:{l:"Oczekuje",bg:"#1a1000",c:"#FFB300"},nadchodzacy:{l:"Nadchodzi",bg:"#001020",c:"#4DA6FF"},aktywny:{l:"Aktywny",bg:"#001a0a",c:"#00C851"},zalegly:{l:"Zaległy",bg:"#1a0000",c:"#FF4444"}};
  const x=m[s]||m.oczekujacy;
  return h("span",{className:"badge",style:{background:x.bg,color:x.c,border:`1px solid ${x.c}33`}},h("span",{className:"badge-dot",style:{background:x.c}}),x.l);
}

// ── editable cell ──────────────────────────────────────────────────────────
function editableCell(value,onSave,opts={}){
  const{type="text",options,color,w=90}=opts;
  const wrap=h("span",{});
  function showDisplay(){
    wrap.innerHTML="";
    const sp=h("span",{className:"editable",style:{color:color||"",minWidth:w+"px"},title:"Kliknij aby edytować"},String(value));
    sp.onclick=()=>showEdit();
    wrap.appendChild(sp);
  }
  function showEdit(){
    wrap.innerHTML="";
    if(options){
      const sel=h("select",{className:"edit-select"});
      options.forEach(o=>{const op=document.createElement("option");op.value=o.v;op.textContent=o.l;if(o.v===value)op.selected=true;sel.appendChild(op);});
      sel.onchange=()=>{value=sel.value;onSave(sel.value);showDisplay();};
      sel.onblur=()=>showDisplay();
      wrap.appendChild(sel);setTimeout(()=>sel.focus(),0);
    }else{
      const inp=h("input",{className:"edit-input",type:type==="number"?"number":"text",value:String(value),style:{width:w+"px"}});
      const save=()=>{const v=type==="number"?+inp.value:inp.value;if(String(v)!==String(value)){value=v;onSave(v);}showDisplay();};
      inp.onblur=save;inp.onkeydown=e=>{if(e.key==="Enter")save();if(e.key==="Escape")showDisplay();};
      wrap.appendChild(inp);setTimeout(()=>inp.focus(),0);
    }
  }
  showDisplay();return wrap;
}

// ── calcs ──────────────────────────────────────────────────────────────────
function calcs(){
  const{payments,costs}=state;
  const paid=payments.filter(p=>p.status==="oplacony");
  const pend=payments.filter(p=>p.status==="oczekujacy");
  const totR=paid.reduce((s,p)=>s+p.amount,0);
  const totP=pend.reduce((s,p)=>s+p.amount,0);
  const totC=costs.reduce((s,c)=>s+c.amount,0);
  const net=totR-totC;
  return{paid,pend,totR,totP,totC,net,sp:{a:net*.5,b:net*.25,c:net*.25}};
}
function clientMap(){return Object.fromEntries(state.clients.map(c=>[c.id,c]));}

// ── KPI ────────────────────────────────────────────────────────────────────
function kpi(label,value,sub,accent,icon){
  return h("div",{style:{background:"#111",border:"1px solid #222",borderRadius:12,padding:"16px 18px",borderTop:`3px solid ${accent}`,position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"absolute",top:10,right:12,fontSize:18,opacity:.08}},icon),
    h("div",{style:{fontSize:10,color:"#555",marginBottom:6,textTransform:"uppercase",letterSpacing:"1.2px",fontWeight:600}},label),
    h("div",{style:{fontSize:20,fontWeight:800,color:accent,marginBottom:2,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}},value),
    h("div",{style:{fontSize:11,color:"#555"}},sub)
  );
}

// ── modal helpers ──────────────────────────────────────────────────────────
function field(label,inputEl,half){return h("div",{style:{marginBottom:12,...(half?{flex:1}:{})}},h("label",{className:"field-label"},label),inputEl);}
function row2(...c){return h("div",{style:{display:"flex",gap:10}},c);}

// ── SCREENS ────────────────────────────────────────────────────────────────
function renderLogin(){
  let pw="",show=false,err=false,shaking=false;
  const wrap=h("div",{style:{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",padding:16}});
  const inner=h("div",{className:"fi",style:{width:"100%",maxWidth:360}});
  wrap.appendChild(inner);
  function build(){
    inner.innerHTML="";
    inner.appendChild(h("div",{style:{textAlign:"center",marginBottom:32}},
      h("div",{style:{width:50,height:50,background:"#E60000",borderRadius:12,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',sans-serif",marginBottom:12}},"A"),
      h("div",{},h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3}},"AFFILIATE"),h("span",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3,color:"#E60000"}},"DESK")),
      h("div",{style:{fontSize:11,color:"#555",marginTop:3,letterSpacing:1}},"PANEL FINANSOWY · PRO")
    ));
    const card=h("div",{className:shaking?"shake":"",style:{background:"#111",border:"1px solid #222",borderTop:"3px solid #E60000",borderRadius:14,padding:26}});
    card.appendChild(h("div",{style:{fontSize:11,color:"#555",marginBottom:18,letterSpacing:1,textTransform:"uppercase",fontWeight:600}},"🔒 Wymagane hasło dostępu"));
    const pwWrap=h("div",{style:{position:"relative",marginBottom:8}});
    const pwInp=h("input",{type:show?"text":"password",placeholder:"Wpisz hasło…",style:{width:"100%",background:"#1e1e1e",border:`1px solid ${err?"#E60000":"#2a2a2a"}`,borderRadius:8,padding:"9px 44px 9px 11px",color:"#fff",fontSize:15}});
    pwInp.value=pw;pwInp.oninput=e=>{pw=e.target.value;err=false;};pwInp.onkeydown=e=>{if(e.key==="Enter")tryLogin();};
    const eye=h("button",{style:{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:15,padding:4}},show?"🙈":"👁");
    eye.onclick=()=>{show=!show;build();};
    pwWrap.appendChild(pwInp);pwWrap.appendChild(eye);
    card.appendChild(h("label",{className:"field-label"},"Hasło"));card.appendChild(pwWrap);
    if(err)card.appendChild(h("div",{style:{color:"#FF4444",fontSize:12,marginBottom:8,fontWeight:600}},"⚠ Nieprawidłowe hasło"));
    const loginBtn=h("button",{className:"btn-red",style:{width:"100%",padding:13,fontSize:14,letterSpacing:1}},"ZALOGUJ SIĘ →");
    loginBtn.onclick=tryLogin;card.appendChild(loginBtn);inner.appendChild(card);
    setTimeout(()=>pwInp.focus(),50);
  }
  function tryLogin(){if(pw===PASSWORD)setState({loggedIn:true});else{err=true;shaking=true;pw="";build();setTimeout(()=>{shaking=false;build();},500);}}
  build();return wrap;
}

function renderDashboard(){
  const{totR,totP,totC,net,sp,paid,pend}=calcs();
  const cm=clientMap();
  const el=h("div",{});
  el.appendChild(h("h1",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,margin:"0 0 3px",letterSpacing:2}},"PRZEGLĄD — MAJ 2026"));
  el.appendChild(h("p",{style:{color:"#555",margin:"0 0 14px",fontSize:12}},`${state.clients.filter(c=>c.status==="aktywny").length} aktywnych klientów`));
  const grid=h("div",{className:"kpi-grid"});
  grid.appendChild(kpi("Przychody (opłacone)",fmt(totR),`${paid.length} faktur`,"#00C851","💰"));
  grid.appendChild(kpi("Oczekuje na wpłatę",fmt(totP),`${pend.length} faktur`,"#FFB300","⏳"));
  grid.appendChild(kpi("Koszty operacyjne",fmt(totC),`${state.costs.length} pozycji`,"#E60000","📉"));
  grid.appendChild(kpi("Zysk netto",fmt(net),"50/25/25","#4DA6FF","📈"));
  el.appendChild(grid);
  const two=h("div",{className:"two-col"});
  const upCard=h("div",{className:"card"});
  upCard.appendChild(h("h3",{style:{margin:"0 0 11px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Najbliższe płatności"));
  const upcoming=[...state.payments].filter(p=>p.status!=="oplacony").sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
  upcoming.forEach(p=>{
    const d=dU(p.date);
    const r=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1e1e1e"}});
    const left=h("div",{});
    left.appendChild(h("div",{style:{fontSize:13,fontWeight:600}},cm[p.clientId]?.name||"—"));
    const sub=h("div",{style:{fontSize:11,color:"#555",marginTop:1}},fmtDate(p.date)+" · ");
    sub.appendChild(d<0?h("span",{style:{color:"#FF4444"}},`zaległe ${Math.abs(d)}d`):d===0?h("span",{style:{color:"#E60000",fontWeight:800}},"DZIŚ!"):h("span",{style:{color:d<=3?"#FFB300":"#555"}},`za ${d}d`));
    left.appendChild(sub);
    const right=h("div",{style:{textAlign:"right"}});
    right.appendChild(h("div",{style:{fontWeight:800,fontSize:14,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}},fmt(p.amount)));
    right.appendChild(badge(d<0?"zalegly":p.status));
    r.appendChild(left);r.appendChild(right);upCard.appendChild(r);
  });
  if(!upcoming.length)upCard.appendChild(h("div",{style:{color:"#555",fontSize:13}},"Brak oczekujących 🎉"));
  two.appendChild(upCard);
  const splitCard=h("div",{className:"card"});
  splitCard.appendChild(h("h3",{style:{margin:"0 0 11px",fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:"1.5px",fontWeight:700}},"Podział zysku netto"));
  const eq=h("div",{style:{marginBottom:10,padding:"8px 12px",background:"#0a0a0a",borderRadius:8,fontSize:12,color:"#555",display:"flex",justifyContent:"space-between"}});
  eq.appendChild(h("span",{},`${fmt(totR)} − ${fmt(totC)}`));eq.appendChild(h("span",{style:{color:"#4DA6FF",fontWeight:800,fontFamily:"'Bebas Neue',sans-serif"}},fmt(net)));
  splitCard.appendChild(eq);
  [{n:"Wspólnik A",p:"50%",a:sp.a,c:"#E60000",w:"50%"},{n:"Wspólnik B",p:"25%",a:sp.b,c:"#00C851",w:"25%"},{n:"Wspólnik C",p:"25%",a:sp.c,c:"#4DA6FF",w:"25%"}].forEach(s=>{
    const sr=h("div",{style:{marginBottom:10}});
    const sr2=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}});

// ── CONFIRM DELETE ─────────────────────────────────────────────────────────
function confirmDelete(msg, onConfirm) {
  const bg = h("div", {className:"modal-bg"});
  const box = h("div", {style:{background:"#181818",border:"1px solid #3a0000",borderTop:"3px solid #E60000",borderRadius:14,padding:24,width:"100%",maxWidth:360,textAlign:"center"}});
  box.onclick = e => e.stopPropagation();
  box.appendChild(h("div",{style:{fontSize:28,marginBottom:12}},"🗑️"));
  box.appendChild(h("div",{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1.5,marginBottom:8}},"POTWIERDZENIE USUNIĘCIA"));
  box.appendChild(h("div",{style:{fontSize:13,color:"#aaa",marginBottom:20,lineHeight:1.5}},msg));
  const btns = h("div",{style:{display:"flex",gap:10,justifyContent:"center"}});
  const cancel = h("button",{className:"btn-ghost",style:{padding:"10px 20px"}},"Anuluj");
  cancel.onclick = () => bg.remove();
  const confirm = h("button",{style:{background:"#E60000",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}},"Tak, usuń");
  confirm.onclick = () => { bg.remove(); onConfirm(); };
  btns.appendChild(cancel); btns.appendChild(confirm);
  box.appendChild(btns); bg.appendChild(box);
  document.getElementById("app").appendChild(bg);
}

// ── BACKUP ─────────────────────────────────────────────────────────────────
function downloadBackup() {
  const data = {
    exportDate: new Date().toISOString(),
    clients: state.clients,
    payments: state.payments,
    costs: state.costs
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `affiliatedesk-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast("Backup pobrany ✓");
}

function importBackup() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json";
  inp.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.clients || !data.payments || !data.costs) { toast("Nieprawidłowy plik backup","error"); return; }
        confirmDelete(
          `Wgrać backup z ${data.exportDate ? new Date(data.exportDate).toLocaleDateString("pl-PL") : "?"}?\nNadpisze wszystkie obecne dane!`,
          () => {
            state.clients = data.clients;
            state.payments = data.payments;
            state.costs = data.costs;
            saveToFirebase();
            toast("Backup wgrany ✓");
            render();
          }
        );
      } catch { toast("Błąd odczytu pliku","error"); }
    };
    reader.readAsText(file);
  };
  inp.click();
}
